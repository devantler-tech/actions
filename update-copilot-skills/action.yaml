name: Update Copilot Skills
description: Run `gh skill update --all` against installed skills and report any changes
author: devantler-tech
inputs:
  dir:
    description: Directory to scan for installed skills (passed to `gh skill update --dir`)
    required: false
    default: "."
  dry-run:
    description: When `true`, pass `--dry-run` to `gh skill update` (report without modifying files)
    required: false
    default: "false"
  unpin:
    description: When `true`, pass `--unpin` to `gh skill update` (clear pins and include pinned skills)
    required: false
    default: "false"
  gh-version:
    description: Minimum required `gh` version (must support `gh skill`)
    required: false
    default: 2.90.0
  github-token:
    description: GitHub token exposed to `gh` as `GH_TOKEN`
    required: false
    default: ${{ github.token }}
outputs:
  changed:
    description: "`true` when at least one SKILL.md was modified, `false` otherwise"
    value: ${{ steps.update.outputs.changed }}
  updated-skills:
    description: Raw stdout from `gh skill update --all` (blank when nothing changed)
    value: ${{ steps.update.outputs.updated-skills }}
runs:
  using: composite
  steps:
    # Mirror of the gh bootstrap in setup-copilot-skills/action.yaml.
    # Keep these two blocks in sync — composite actions cannot share steps.
    - name: 🔧 Ensure gh >= required version
      shell: bash
      env:
        REQUIRED: ${{ inputs.gh-version }}
      run: | # zizmor: ignore[github-env]
        set -euo pipefail
        if command -v gh >/dev/null 2>&1 && gh skill --help >/dev/null 2>&1; then
          current=$(gh --version | awk '/^gh version /{print $3; exit}')
          if [ -z "$current" ]; then
            echo "::error::Could not determine the installed gh version from 'gh --version' output."
            exit 1
          fi
          if printf '%s\n%s\n' "$REQUIRED" "$current" | sort -V -C; then
            echo "Installed gh ($current) already supports 'gh skill'."
            exit 0
          fi
        fi

        case "$(uname -s)" in
          Linux)   os=linux;  ext=tar.gz ;;
          Darwin)  os=macOS;  ext=zip ;;
          *) echo "::error::Automatic gh install is only supported on Linux and macOS. On $(uname -s) (e.g. Windows), preinstall gh >= ${REQUIRED} on the runner before this step."; exit 1 ;;
        esac
        case "$(uname -m)" in
          x86_64|amd64) arch=amd64 ;;
          arm64|aarch64) arch=arm64 ;;
          *) echo "::error::Unsupported arch: $(uname -m)"; exit 1 ;;
        esac

        tmp=$(mktemp -d)
        asset="gh_${REQUIRED}_${os}_${arch}.${ext}"
        url="https://github.com/cli/cli/releases/download/v${REQUIRED}/${asset}"
        echo "Downloading $url"
        if [ "$ext" = "zip" ]; then
          if ! command -v unzip >/dev/null 2>&1; then
            echo "::error::unzip is required to extract the macOS gh release archive but is not available on PATH."
            exit 1
          fi
          curl -fsSL -o "$tmp/$asset" "$url"
          unzip -q "$tmp/$asset" -d "$tmp"
        else
          curl -fsSL "$url" | tar -xzC "$tmp"
        fi
        install_dir="${RUNNER_TEMP:-/tmp}/update-copilot-skills/bin"
        mkdir -p "$install_dir"
        install "$tmp/gh_${REQUIRED}_${os}_${arch}/bin/gh" "$install_dir/gh"
        echo "$install_dir" >> "$GITHUB_PATH"  # zizmor: ignore[github-env]
        export PATH="$install_dir:$PATH"
        hash -r
        gh --version
        if ! gh skill --help >/dev/null 2>&1; then
          echo "::error::Installed gh still does not expose the 'skill' command."
          exit 1
        fi

    - name: 🔄 Update skills
      id: update
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        INPUT_DIR: ${{ inputs.dir }}
        INPUT_DRY_RUN: ${{ inputs.dry-run }}
        INPUT_UNPIN: ${{ inputs.unpin }}
      run: |
        set -euo pipefail

        if [ ! -d "$INPUT_DIR" ]; then
          echo "::error::Directory not found: $INPUT_DIR"
          exit 1
        fi

        # Snapshot SKILL.md contents before running so we can detect modifications
        # without relying on git being present in the caller's environment.
        if ! command -v shasum >/dev/null 2>&1; then
          echo "::error::'shasum' is required on the runner to detect SKILL.md changes but was not found on PATH."
          exit 1
        fi
        before=$(mktemp)
        find "$INPUT_DIR" -type f -name SKILL.md -print0 \
          | sort -z \
          | xargs -0 -r shasum -a 256 >"$before"

        # Discover all skill root directories under INPUT_DIR.
        # gh skill update --dir X expects X/skills/*/SKILL.md (one level).
        # To support nested layouts like plugins/<plugin>/skills/<skill>/SKILL.md,
        # we find every SKILL.md and derive the root each one belongs to.
        mapfile -t roots < <(
          find "$INPUT_DIR" -type f -name SKILL.md -print0 \
            | while IFS= read -r -d '' md; do
                skill_dir=$(dirname "$md")
                parent_dir=$(dirname "$skill_dir")
                if [[ "$(basename "$parent_dir")" == "skills" ]]; then
                  dirname "$parent_dir"
                else
                  echo "$parent_dir"
                fi
              done \
            | sort -u
        )

        if [ ${#roots[@]} -eq 0 ]; then
          echo "No installed skills found."
          echo "changed=false" >> "$GITHUB_OUTPUT"
          {
            echo "updated-skills<<EOF"
            echo "No installed skills found."
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          rm -f "$before"
          exit 0
        fi

        out=$(mktemp)
        status=0
        for root in "${roots[@]}"; do
          root_flags=(--all --dir "$root")
          case "$INPUT_DRY_RUN" in
            true|1|yes) root_flags+=(--dry-run) ;;
          esac
          case "$INPUT_UNPIN" in
            true|1|yes) root_flags+=(--unpin) ;;
          esac
          echo "::group::Updating skills in $root"
          if ! gh skill update "${root_flags[@]}" 2>&1 | tee -a "$out"; then
            echo "::error::'gh skill update ${root_flags[*]}' failed."
            status=1
          fi
          echo "::endgroup::"
        done

        after=$(mktemp)
        find "$INPUT_DIR" -type f -name SKILL.md -print0 \
          | sort -z \
          | xargs -0 -r shasum -a 256 >"$after"

        if cmp -s "$before" "$after"; then
          echo "changed=false" >> "$GITHUB_OUTPUT"
        else
          echo "changed=true" >> "$GITHUB_OUTPUT"
        fi

        # Strip spinner carriage-returns + ANSI escape sequences before exposing stdout as an output.
        cleaned=$(sed -e 's/\r/\n/g' -e 's/\x1B\[[0-9;]*[a-zA-Z]//g' "$out" \
          | grep -vE '^Checking .* installed skill' \
          | sed '/^$/d')
        {
          echo "updated-skills<<EOF"
          printf '%s\n' "$cleaned"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"

        rm -f "$before" "$after" "$out"

        if [ "$status" -ne 0 ]; then
          exit 1
        fi
