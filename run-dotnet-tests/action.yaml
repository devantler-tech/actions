name: Run Dotnet Tests
description: Test .NET solution or project
author: devantler-tech
inputs:
  github-token:
    description: GitHub token to access the repository
    required: true
  working-directory:
    description: Directory to run the tests in
    required: false
    default: .
runs:
  using: composite
  steps:
    - name: ⚙️ Setup .NET
      uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
      with:
        # Provision both the previous STS (9) and the current LTS (10) so callers can
        # target either TFM. Multiple lines install side-by-side SDKs.
        dotnet-version: |
          9
          10
    - name: 🚚 Restore packages
      run: |
        set -euo pipefail
        config="$(mktemp)"
        trap 'rm -f "$config"' EXIT
        chmod 600 "$config"
        cat >"$config" <<'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <configuration>
          <packageSources>
            <clear />
            <add key="nuget.org" value="https://api.nuget.org/v3/index.json" />
            <add key="github" value="https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" />
          </packageSources>
        </configuration>
        EOF
        dotnet restore --configfile "$config"
      env:
        # NuGet reads source credentials from this process-only environment variable, so the
        # token is neither written to NuGet.Config nor exposed to repository-controlled tests.
        NuGetPackageSourceCredentials_github: Username=${{ github.actor }};Password=${{ inputs.github-token }};ValidAuthenticationTypes=Basic
      shell: bash
      working-directory: ${{ inputs.working-directory }}
    - name: 🧪 Test
      run: dotnet test --no-restore --collect:"XPlat Code Coverage" --logger "console;verbosity=detailed"
      shell: bash
      working-directory: ${{ inputs.working-directory }}
    # GitHub Code Quality accepts a single Cobertura report, so merge the per-project files.
    # Linux only — one upload per repo avoids the matrix triple-reporting the same coverage.
    # best-effort: this is a preview feature, so it must never break .NET CI.
    - name: 🔀 Merge coverage into a single Cobertura report
      if: runner.os == 'Linux'
      continue-on-error: true
      run: |
        dotnet tool install --global dotnet-reportgenerator-globaltool --version 5.5.10
        export PATH="$PATH:$HOME/.dotnet/tools"
        reportgenerator -reports:'**/coverage.cobertura.xml' -targetdir:coverage-merged -reporttypes:Cobertura
      shell: bash
      working-directory: ${{ inputs.working-directory }}
    # Inlines the sibling upload-coverage wrapper (one pinned step): a composite action cannot
    # self-reference its own repo at the same commit (`uses:` takes no expressions, and
    # github.action_* is unreliable when this action is invoked via a local path), so calling
    # the third-party action directly is the only zero-lag option. Keep the inputs in sync
    # with upload-coverage/action.yaml.
    - name: 📊 Upload Code Coverage to GitHub Code Quality
      if: runner.os == 'Linux'
      continue-on-error: true
      uses: actions/upload-code-coverage@b51da2c3c1b23e04d2d6477cfc34350b1f5cd3e9 # v1.2.0
      with:
        file: ${{ inputs.working-directory }}/coverage-merged/Cobertura.xml
        language: C#
        label: code-coverage/dotnet
        # best-effort during the Code Quality preview — never break .NET CI on upload hiccups.
        fail-on-error: "false"
        token: ${{ github.token }}
