name: Setup KSail CLI
description: Install KSail CLI via Homebrew
author: devantler-tech

runs:
  using: "composite"
  steps:
    - name: 📦 Setup Homebrew
      # Pinned to a branch commit, not a tag: Homebrew/actions publishes no tags
      # or releases (main-tracked only), so the comment names the branch + why
      # rather than a `# v<version>` — see CONTRIBUTING.md "External action pinning".
      uses: Homebrew/actions/setup-homebrew@ac399ee818eb2bb93b838aeccd2cbaa6272e2403 # main (no upstream releases)

    - name: ⤵️ Install KSail
      shell: bash
      run: |
        brew tap devantler-tech/formulas
        # KSail ships as a Cask. Homebrew refuses to load Casks from a non-official
        # tap when HOMEBREW_REQUIRE_TAP_TRUST is set (now enforced on the CI runners),
        # failing with "Refusing to load cask … from untrusted tap". Explicitly trust
        # our own first-party tap so `brew install` can load it non-interactively.
        brew trust --tap devantler-tech/formulas
        brew install ksail
