name: Create Issues from TODOs
description: Create GitHub issues from TODO comments in code
author: devantler-tech
inputs:
  client-id:
    description: GitHub App Client ID (preferred over the deprecated app-id)
    required: false
  app-id:
    description: 'GitHub App ID. Deprecated: use client-id instead.'
    required: false
  app-private-key:
    description: GitHub App Private Key
    required: true
  project:
    description: GitHub Project to add issues to
    required: false
runs:
  using: composite
  steps:
    - name: 🔑 Generate GitHub App Token
      uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
      id: app-token
      with:
        client-id: ${{ inputs.client-id }}
        app-id: ${{ inputs.app-id }}
        private-key: ${{ inputs.app-private-key }}
        # Least-privilege: this token is consumed only as the todo-to-issue
        # action's PROJECTS_SECRET (adding issues to an org Project); issue
        # create/close/assign use the workflow's default GITHUB_TOKEN. Scope it
        # to organization projects instead of inheriting the App installation's
        # blanket permissions (zizmor github-app).
        permission-organization-projects: write
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    # Floor is v5.1.15: earlier releases crash the whole workflow with
    # `KeyError: 'web_url'` when a removed to-do marker matches multiple existing
    # issues (GitLab-only field in the ambiguous-match diagnostic). Never downgrade
    # past it. (Lowercase "to-do" avoids this action self-matching its own comment.)
    # Wrapped in a retry: alstr/todo-to-issue-action does an UNAUTHENTICATED fetch of
    # github/linguist's languages.yml/syntax.json from raw.githubusercontent.com on
    # every run and aborts the whole step on any non-200 (devantler-tech/actions#483)
    # — a transient CDN 429/5xx must not fail the job outright.
    - uses: Wandalen/wretry.action@e68c23e6309f2871ca8ae4763e7629b9c258e1ea # v3.8.0
      with:
        action: alstr/todo-to-issue-action@37bb7b56e58569ef273b60678048030a7f0c261a # v5.1.15
        attempt_limit: 3
        attempt_delay: 5000
        with: |
          AUTO_ASSIGN: true
          CLOSE_ISSUES: true
          PROJECT: ${{ inputs.project }}
          PROJECTS_SECRET: ${{ steps.app-token.outputs.token }}
