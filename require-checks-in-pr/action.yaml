name: Require Checks in PR
description: |
  Aggregates the results of multiple jobs into a single required check.
  Fails if any job failed or was cancelled. Skipped jobs are treated as
  acceptable (non-failure). Useful for branch protection rules that need
  a single, stable check name.
author: devantler-tech

inputs:
  job-results:
    description: |
      List of job results to check (passed as a YAML array).
      Each result should be one of: success, failure, cancelled, skipped.
      Example:
        job-results:
          - ${{ needs.build.result }}
          - ${{ needs.test.result }}
    required: true
  check-name:
    description: |
      Display name used in success/failure messages.
    required: false
    default: "CI - Required Checks"

runs:
  using: composite
  steps:
    - name: "📊 Summarize workflow result"
      shell: bash
      env:
        JOB_RESULTS: ${{ inputs.job-results }}
        CHECK_NAME: ${{ inputs.check-name }}
      run: |
        set -Eeuo pipefail

        failed=false
        allowed_values="success, failure, cancelled, skipped"

        # GitHub Actions serializes YAML arrays as JSON strings.
        # An empty string means no results were provided (treat as success).
        if [[ -z "$JOB_RESULTS" || "$JOB_RESULTS" == "[]" ]]; then
          printf '%s\n' "✅ $CHECK_NAME — no job results to check."
          exit 0
        fi

        mapfile -t results < <(printf '%s' "$JOB_RESULTS" | jq -r '.[]')

        for result in "${results[@]}"; do
          case "$result" in
            success|skipped)
              ;;
            failure|cancelled)
              failed=true
              ;;
            *)
              printf '%s\n' "❌ $CHECK_NAME — unknown job result: '$result'. Allowed values: $allowed_values."
              exit 1
              ;;
          esac
        done

        if [ "$failed" = true ]; then
          printf '%s\n' "❌ $CHECK_NAME — at least one job failed or was cancelled."
          exit 1
        fi

        printf '%s\n' "✅ $CHECK_NAME — all jobs succeeded or were skipped."
