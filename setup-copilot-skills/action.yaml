name: Setup Copilot Skills
description: Install agent skills with the gh skill CLI from a newline list of "<owner/repo> <skill>[@pin]" entries
author: devantler-tech
inputs:
  skills:
    description: |
      Newline-separated list of skills to install. Each non-blank, non-comment line has the form
      `<owner/repo> <skill>[@pin]`, where `@pin` is an optional tag, branch, or commit SHA. Blank
      lines and lines starting with `#` are ignored.
    required: true
  agent:
    description: Value passed to `gh skill install --agent`
    required: false
    default: github-copilot
  scope:
    description: Value passed to `gh skill install --scope` (`project` or `user`)
    required: false
    default: project
  gh-version:
    description: Minimum required `gh` version (must support `gh skill`)
    required: false
    default: 2.90.0
  github-token:
    description: GitHub token exposed to `gh` as `GH_TOKEN`
    required: false
    default: ${{ github.token }}
outputs:
  installed-skills:
    description: Newline-separated list of `source/skill-name[@pin]` entries that were installed
    value: ${{ steps.install.outputs.installed-skills }}
runs:
  using: composite
  steps:
    - name: 🔧 Ensure gh >= required version
      shell: bash
      env:
        REQUIRED: ${{ inputs.gh-version }}
      run: | # zizmor: ignore[github-env]
        set -euo pipefail
        if command -v gh >/dev/null 2>&1 && gh skill --help >/dev/null 2>&1; then
          current=$(gh --version | awk '/^gh version /{print $3; exit}')
          if [ -z "$current" ]; then
            echo "::error::Could not determine the installed gh version from 'gh --version' output."
            exit 1
          fi
          if printf '%s\n%s\n' "$REQUIRED" "$current" | sort -V -C; then
            echo "Installed gh ($current) already supports 'gh skill'."
            exit 0
          fi
        fi

        case "$(uname -s)" in
          Linux)   os=linux;  ext=tar.gz ;;
          Darwin)  os=macOS;  ext=zip ;;
          *) echo "::error::Automatic gh install is only supported on Linux and macOS. On $(uname -s) (e.g. Windows), preinstall gh >= ${REQUIRED} on the runner before this step."; exit 1 ;;
        esac
        case "$(uname -m)" in
          x86_64|amd64) arch=amd64 ;;
          arm64|aarch64) arch=arm64 ;;
          *) echo "::error::Unsupported arch: $(uname -m)"; exit 1 ;;
        esac

        tmp=$(mktemp -d)
        asset="gh_${REQUIRED}_${os}_${arch}.${ext}"
        url="https://github.com/cli/cli/releases/download/v${REQUIRED}/${asset}"
        echo "Downloading $url"
        if [ "$ext" = "zip" ]; then
          if ! command -v unzip >/dev/null 2>&1; then
            echo "::error::unzip is required to extract the macOS gh release archive but is not available on PATH."
            exit 1
          fi
          curl -fsSL -o "$tmp/$asset" "$url"
          unzip -q "$tmp/$asset" -d "$tmp"
        else
          curl -fsSL "$url" | tar -xzC "$tmp"
        fi
        install_dir="${RUNNER_TEMP:-/tmp}/setup-copilot-skills/bin"
        mkdir -p "$install_dir"
        install "$tmp/gh_${REQUIRED}_${os}_${arch}/bin/gh" "$install_dir/gh"
        echo "$install_dir" >> "$GITHUB_PATH"  # zizmor: ignore[github-env]
        export PATH="$install_dir:$PATH"
        hash -r
        gh --version
        if ! gh skill --help >/dev/null 2>&1; then
          echo "::error::Installed gh still does not expose the 'skill' command."
          exit 1
        fi

    - name: 📦 Install skills
      id: install
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        INPUT_SKILLS: ${{ inputs.skills }}
        INPUT_AGENT: ${{ inputs.agent }}
        INPUT_SCOPE: ${{ inputs.scope }}
      run: |
        set -euo pipefail

        if [ -z "${INPUT_SKILLS//[[:space:]]/}" ]; then
          echo "::error::'skills' input is empty. Provide a newline-separated list of '<owner/repo> <skill>[@pin]' entries."
          exit 1
        fi

        installed_file=$(mktemp)
        status=0

        while IFS= read -r raw || [ -n "$raw" ]; do
          line=${raw%%#*}
          line=$(printf '%s' "$line" | awk '{$1=$1;print}')
          [ -z "$line" ] && continue

          # shellcheck disable=SC2086
          set -- $line
          if [ "$#" -lt 2 ]; then
            echo "::error::Invalid skills entry: '$raw' — expected '<owner/repo> <skill>[@pin]'"
            status=1
            continue
          fi
          src="$1"
          spec="$2"
          pin=""
          name="$spec"
          case "$spec" in
            *@*) name=${spec%@*}; pin=${spec#*@} ;;
          esac

          if [ -n "$pin" ]; then
            echo "Installing ${src}/${name}@${pin} (agent=${INPUT_AGENT}, scope=${INPUT_SCOPE})..."
            gh skill install "$src" "$name" --agent "$INPUT_AGENT" --scope "$INPUT_SCOPE" --pin "$pin"
          else
            echo "Installing ${src}/${name} (agent=${INPUT_AGENT}, scope=${INPUT_SCOPE})..."
            gh skill install "$src" "$name" --agent "$INPUT_AGENT" --scope "$INPUT_SCOPE"
          fi
          if [ -n "$pin" ]; then
            printf '%s/%s@%s\n' "$src" "$name" "$pin" >> "$installed_file"
          else
            printf '%s/%s\n' "$src" "$name" >> "$installed_file"
          fi
        done <<<"$INPUT_SKILLS"

        {
          echo "installed-skills<<EOF"
          cat "$installed_file"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"
        rm -f "$installed_file"
        exit "$status"
