  # ── run-dotnet-tests (gate block path) ─────────────────────
  # run-dotnet-tests is a GATING workflow — its job is to FAIL a PR when a .NET test fails.
  # Per AGENTS.md § "Failure-mode coverage for gating workflows", a happy-path test alone
  # cannot catch a gate that silently stopped biting, so it also needs a blocks-on-bad-input
  # self-test (mirrors the Go gate's test-validate-go-test-blocks). This points the gate's
  # own `dotnet test` command at a fixture whose only test fails on purpose and asserts the
  # run is blocked. test-run-dotnet-tests-gate-lockstep keeps the command in sync with the gate.
  test-run-dotnet-tests-blocks:
    if: "${{ !startsWith(github.head_ref, 'release-please--') && !startsWith(github.event.head_commit.message, 'chore(main): release ') }}"
    name: "[Test] Run .NET Tests - Gate Blocks"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 🛡️ Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: 📄 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: ⚙️ Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          # Match run-dotnet-tests/action.yaml's SDK provisioning (previous STS + current LTS).
          dotnet-version: |
            9
            10

      # Mirror run-dotnet-tests/action.yaml's test step (`dotnet test …`) against a fixture
      # whose only test fails on purpose, so the run exits non-zero — exactly the gate's
      # "a failing test fails the build" block path. The output is captured so the next step
      # can confirm a real test failure rather than a build/operational error. The command is
      # kept in lockstep with the gate by test-run-dotnet-tests-gate-lockstep.
      - name: 🧪 Test failing fixture (expected to fail)
        id: dotnettest
        continue-on-error: true
        working-directory: .github/fixtures/run-dotnet-tests-failing
        shell: bash
        run: |
          set -uo pipefail
          dotnet test --collect:"XPlat Code Coverage" --logger "console;verbosity=detailed" 2>&1 | tee dotnet-test-output.txt
          exit "${PIPESTATUS[0]}"

      - name: ✅ Assert the test gate blocked on the failing test
        shell: bash
        env:
          OUTCOME: ${{ steps.dotnettest.outcome }}
        run: |
          set -euo pipefail
          OUT=.github/fixtures/run-dotnet-tests-failing/dotnet-test-output.txt
          if [ "$OUTCOME" != "failure" ]; then
            echo "::error::dotnet test should FAIL on the deliberately-failing test in .github/fixtures/run-dotnet-tests-failing, but its outcome was '$OUTCOME'. run-dotnet-tests' test gate is no longer blocking on failing tests."
            exit 1
          fi
          if ! grep -q "Test Run Failed" "$OUT" 2>/dev/null || ! grep -q "Test_DeliberatelyFails" "$OUT" 2>/dev/null; then
            echo "::error::dotnet test failed, but its output did not show the deliberately-failing test run (expected 'Test Run Failed' + 'Test_DeliberatelyFails') — the failure was operational (e.g. a build/restore error), not a real test failure. Output:"
            cat "$OUT" 2>/dev/null || echo "(no output captured)"
            exit 1
          fi
          echo "Test gate correctly blocked on the failing test ✅"

  # ── run-dotnet-tests (gate lockstep) ───────────────────────
  test-run-dotnet-tests-gate-lockstep:
    if: "${{ !startsWith(github.head_ref, 'release-please--') && !startsWith(github.event.head_commit.message, 'chore(main): release ') }}"
    name: "[Test] Run .NET Tests - Gate Lockstep"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 🛡️ Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: 📄 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # test-run-dotnet-tests-blocks hard-codes the gate's `dotnet test` command to exercise
      # it against a failing fixture. This guard asserts run-dotnet-tests/action.yaml still
      # runs the SAME command, so the self-test always exercises the real gate. If the gate's
      # test command changes without updating the self-test, this check goes red and forces
      # them to move in lockstep (mirrors test-validate-go-gate-lockstep).
      - name: 🔒 Assert the gate runs the self-tested test command
        shell: bash
        env:
          GATE: run-dotnet-tests/action.yaml
          # Match the full command, not a bare substring — commands also appear in comments,
          # so a looser grep could false-pass if the real value changed while a comment did not.
          EXPECTED_TEST_CMD: 'dotnet test --collect:"XPlat Code Coverage" --logger "console;verbosity=detailed"'
        run: |
          set -euo pipefail
          if ! grep -qF "$EXPECTED_TEST_CMD" "$GATE"; then
            echo "::error::$GATE no longer runs '$EXPECTED_TEST_CMD'. If the gate's test command changed intentionally, update test-run-dotnet-tests-blocks and this EXPECTED_TEST_CMD so the self-test keeps exercising the real gate."
            exit 1
          fi
          echo "run-dotnet-tests/action.yaml runs the self-tested test command ✅"

  # run-dotnet-tests INLINES upload-coverage's single pinned step (a composite action
  # cannot `uses:` its own repo at the same commit), so nothing structural ties the two
  # definitions together. This guard treats upload-coverage/action.yaml as the source of
  # truth and asserts the inlined step still pins the SAME action SHA and passes the SAME
  # input set, so a bump or input change to the wrapper cannot silently leave the inline
  # copy behind (mirrors test-govulncheck-action-lockstep).
  test-run-dotnet-tests-coverage-inline-lockstep:
    if: "${{ !startsWith(github.head_ref, 'release-please--') && !startsWith(github.event.head_commit.message, 'chore(main): release ') }}"
    name: "[Test] Run .NET Tests - Coverage Inline Lockstep"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 🛡️ Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: 📄 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: 🔒 Assert the inlined coverage step matches upload-coverage/action.yaml
        shell: bash
        env:
          WRAPPER: upload-coverage/action.yaml
          INLINE: run-dotnet-tests/action.yaml
        run: |
          set -euo pipefail
          # yq is preinstalled on the GitHub-hosted ubuntu-latest runner image.
          # Select the upload step by content on BOTH sides (never positionally), so an
          # unrelated step added to either action cannot silently divert the comparison.
          wrapper_uses="$(yq -r '[.runs.steps[] | select((.uses // "") | contains("upload-code-coverage"))] | .[0].uses' "$WRAPPER")"
          inline_uses="$(yq -r '[.runs.steps[] | select((.uses // "") | contains("upload-code-coverage"))] | .[0].uses' "$INLINE")"
          if [[ "$inline_uses" != "$wrapper_uses" ]]; then
            echo "::error file=$INLINE::the inlined coverage-upload step pins '$inline_uses' but $WRAPPER pins '$wrapper_uses'. Update the inline step to match — $WRAPPER is the source of truth."
            exit 1
          fi
          # Input SET only, not values: the wrapper passes generic `inputs.*` expressions while
          # the inline step passes their .NET-specialized instantiations, so values differ by design.
          wrapper_inputs="$(yq -r '[.runs.steps[] | select((.uses // "") | contains("upload-code-coverage"))] | .[0].with | keys | .[]' "$WRAPPER" | sort)"
          inline_inputs="$(yq -r '[.runs.steps[] | select((.uses // "") | contains("upload-code-coverage"))] | .[0].with | keys | .[]' "$INLINE" | sort)"
          if [[ "$inline_inputs" != "$wrapper_inputs" ]]; then
            echo "::error file=$INLINE::the inlined coverage-upload step passes inputs [$(tr '\n' ' ' <<<"$inline_inputs")] but $WRAPPER's step passes [$(tr '\n' ' ' <<<"$wrapper_inputs")]. Keep the input set in lockstep — $WRAPPER is the source of truth."
            exit 1
          fi
          echo "run-dotnet-tests inlined coverage step matches $WRAPPER (uses + input set) ✅"

  # ── lint-readme-parity ──────────────────────────────────────
  lint-readme-parity:
    if: "${{ !startsWith(github.head_ref, 'release-please--') && !startsWith(github.event.head_commit.message, 'chore(main): release ') }}"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: 📋 Check README ↔ action.yaml input/output parity
        shell: bash
        run: |
          # Bidirectional README <-> action.yaml input/output parity check:
          #   forward — every input/output declared in an action.yaml must appear
          #             in its README's ## Inputs / ## Outputs table; and
          #   reverse — every name in those README tables must be a declared
          #             input/output (catches rows left stale by a rename/removal).
          # yq is preinstalled on the GitHub-hosted ubuntu-latest runner image.
          status=0

          # Section body between '## <heading>' and the next '## ' heading.
          section() { awk -v h="$1" '/^## /{f=0} f; $0 ~ "^## " h "$" {f=1}' "$2"; }
          # First-column names from the markdown table under '## <heading>'
          # (skips the header row and the |---|---| separator row).
          table_names() {
            awk -v h="$1" '
              /^## / {f=0}
              $0 ~ "^## " h "$" {f=1; next}
              f && /^[ \t]*\|/ {
                if ($0 ~ /^[ \t]*\|[ :|-]+\|?[ \t]*$/) next
                line=$0; sub(/^[ \t]*\|/,"",line); split(line,a,"|"); cell=a[1]
                gsub(/[`* \t]/,"",cell)
                if (cell!="" && cell!="Input" && cell!="Output" && cell!="Name") print cell
              }' "$2"
          }

          for action_yaml in */action.yaml; do
            dir="$(dirname "$action_yaml")"
            readme="$dir/README.md"
            if [[ ! -f "$readme" ]]; then
              echo "::error file=$dir::missing README.md"
              status=1
              continue
            fi
            inputs_doc="$(section Inputs "$readme")"
            outputs_doc="$(section Outputs "$readme")"
            declared_in="$(yq -r '.inputs // {} | keys | .[]' "$action_yaml")"
            declared_out="$(yq -r '.outputs // {} | keys | .[]' "$action_yaml")"

            # forward: declared -> documented
            while IFS= read -r name; do
              [[ -z "$name" ]] && continue
              if ! grep -qF "\`$name\`" <<<"$inputs_doc"; then
                echo "::error file=$action_yaml::input '$name' is declared in action.yaml but not documented in $readme (## Inputs)"
                status=1
              fi
            done <<<"$declared_in"
            while IFS= read -r name; do
              [[ -z "$name" ]] && continue
              if ! grep -qF "\`$name\`" <<<"$outputs_doc"; then
                echo "::error file=$action_yaml::output '$name' is declared in action.yaml but not documented in $readme (## Outputs)"
                status=1
              fi
            done <<<"$declared_out"

            # reverse: documented -> declared
            while IFS= read -r name; do
              [[ -z "$name" ]] && continue
              if ! grep -qxF "$name" <<<"$declared_in"; then
                echo "::error file=$readme::'$name' is documented in ## Inputs but not declared in $action_yaml"
                status=1
              fi
            done < <(table_names Inputs "$readme")
            while IFS= read -r name; do
              [[ -z "$name" ]] && continue
              if ! grep -qxF "$name" <<<"$declared_out"; then
                echo "::error file=$readme::'$name' is documented in ## Outputs but not declared in $action_yaml"
                status=1
              fi
            done < <(table_names Outputs "$readme")
          done

          if [[ "$status" -eq 0 ]]; then
            echo "README parity OK: every declared input/output is documented and every documented row is declared."
          fi
          exit "$status"

  lint-ci-coverage-parity:
    if: "${{ !startsWith(github.head_ref, 'release-please--') && !startsWith(github.event.head_commit.message, 'chore(main): release ') }}"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: 🔐 Check Template Sync App-token routing
        shell: bash
        run: bash .github/tests/test-template-sync-token-routing.sh

      - name: 🔀 Check Zizmor event routing
        shell: bash
        run: bash .github/tests/test-zizmor-routing.sh

      - name: 📋 Check ci.yaml test wiring is complete
        shell: bash
        run: |
          # Guards the hand-maintained conventions in this file (see AGENTS.md
          # § Test jobs) so they can never silently drift:
          #   (1)  every composite action (*/action.yaml) is exercised by a job
          #        that does `uses: ./<action>`;
          #   (1b) every reusable workflow (workflow_call) is exercised by a job
          #        that does `uses: ./.github/workflows/<x>.yaml`; and
          #   (2)  ci-required-checks.needs and the `job-results` input of its
          #        ./aggregate-job-checks step name the SAME set of jobs — a job
          #        in `needs:` but missing from `job-results` has its failure
          #        silently ignored (the single required check stays green).
          # yq is preinstalled on the GitHub-hosted ubuntu-latest runner image.
          ci=".github/workflows/ci.yaml"
          status=0

          # (1) action -> test job
          for action_yaml in */action.yaml; do
            a="$(dirname "$action_yaml")"
            if ! grep -qE "uses:[[:space:]]*\./$a([[:space:]]|\$)" "$ci"; then
              echo "::error file=$action_yaml::action '$a' has no test job in $ci (expected a job step with 'uses: ./$a')"
              status=1
            fi
          done

          # (1b) reusable workflow -> test job
          # ci.yaml itself is the CI harness, not a reusable workflow — skip it.
          for wf in .github/workflows/*.yaml; do
            [[ "$wf" == "$ci" ]] && continue
            grep -qE "^[[:space:]]+workflow_call:" "$wf" || continue
            wname="$(basename "$wf")"
            if ! grep -qE "uses:[[:space:]]*\./\.github/workflows/$wname([[:space:]]|\$)" "$ci"; then
              echo "::error file=$wf::reusable workflow '$wname' has no test job in $ci (expected a job step with 'uses: ./.github/workflows/$wname')"
              status=1
            fi
          done

          # (2) ci-required-checks: needs <-> job-results parity
          needs="$(yq -r '.jobs.ci-required-checks.needs[]' "$ci" | sort -u)"
          results="$(
            yq -r '.jobs.ci-required-checks.steps[]
                     | select(.uses == "./aggregate-job-checks")
                     | .with["job-results"]' "$ci" \
              | grep -oE 'needs\.[a-z0-9-]+\.result' \
              | sed -E 's/needs\.(.*)\.result/\1/' | sort -u
          )"

          # forward: every needed job is aggregated (the silent-ignore hazard)
          while IFS= read -r j; do
            [[ -z "$j" ]] && continue
            if ! grep -qxF "$j" <<<"$results"; then
              echo "::error file=$ci::job '$j' is in ci-required-checks.needs but missing from the aggregate-job-checks job-results input — its failure would be silently ignored"
              status=1
            fi
          done <<<"$needs"

          # reverse: every aggregated result has a matching need (else it is never populated)
          while IFS= read -r j; do
            [[ -z "$j" ]] && continue
            if ! grep -qxF "$j" <<<"$needs"; then
              echo "::error file=$ci::job '$j' is referenced in job-results but not in ci-required-checks.needs — its result will never be populated"
              status=1
            fi
          done <<<"$results"

          if [[ "$status" -eq 0 ]]; then
            echo "CI coverage parity OK: every action and reusable workflow has a test job, and ci-required-checks needs <-> job-results are in sync."
          fi
          exit "$status"

  test-zizmor:
    # Pull requests already run the organization-required standalone workflow.
    # Keep this reusable-workflow self-test for main pushes so the default-branch
    # SARIF baseline still refreshes without duplicating the PR advisory scan.
    if: "${{ github.event_name == 'push' && !startsWith(github.head_ref, 'release-please--') && !startsWith(github.event.head_commit.message, 'chore(main): release ') }}"
    name: "[Test] Zizmor - Default Settings"
    uses: ./.github/workflows/scan-for-workflow-vulnerabilities.yaml
    permissions:
      security-events: write
      contents: read
      actions: read

  test-dependency-review-workflow:
    if: "${{ !startsWith(github.head_ref, 'release-please--') && !startsWith(github.event.head_commit.message, 'chore(main): release ') }}"
    name: "[Test] Dependency Review - Default Settings"
    uses: ./.github/workflows/dependency-review.yaml
    permissions:
      contents: read

  test-delete-workflow-runs-all:
    if: "${{ !startsWith(github.head_ref, 'release-please--') && !startsWith(github.event.head_commit.message, 'chore(main): release ') }}"
    name: "[Test] Delete Workflow Runs - All Workflows"
    uses: ./.github/workflows/delete-workflow-runs.yaml
    with:
      days: 30
      minimum-runs: 6
      delete-workflow-by-state-pattern: "ALL"
      delete-run-by-conclusion-pattern: "ALL"
      dry-run: true
    permissions:
      actions: write
      contents: read

  test-delete-workflow-runs-specific:
