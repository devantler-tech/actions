name: 🧪 CI

on:
  pull_request:
  push:
    branches: [main]
  merge_group:

permissions: {}

jobs:
  # ── approve-pr ──────────────────────────────────────────────
  test-approve-pr:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    if: >-
      startsWith(github.event_name, 'pull_request') &&
      (
        github.event.pull_request.user.login == 'dependabot[bot]' ||
        github.event.pull_request.user.login == 'renovate[bot]' ||
        github.event.pull_request.user.login == 'botantler[bot]' ||
        github.event.pull_request.user.login == 'devantler'
      )
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 🧪 Run approve-pr
        uses: ./approve-pr
        with:
          app-id: ${{ vars.APP_ID }}
          app-private-key: ${{ secrets.APP_PRIVATE_KEY }}
          pr-number: ${{ github.event.pull_request.number }}

  # ── cleanup-ghcr-packages ───────────────────────────────────
  test-cleanup-ghcr-packages:
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # Dry run against a stable, long-lived package so the test exercises the
      # action's wiring without ever deleting anything.
      - name: 🧪 Run cleanup-ghcr-packages (dry run)
        uses: ./cleanup-ghcr-packages
        with:
          package: pandoc-plus
          dry-run: "true"

  # ── create-issues-from-todos ────────────────────────────────
  test-create-issues-from-todos:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 🧪 Run create-issues-from-todos
        uses: ./create-issues-from-todos
        with:
          app-id: ${{ vars.APP_ID }}
          app-private-key: ${{ secrets.APP_PRIVATE_KEY }}
          project: organization/devantler-tech/5

  # ── enable-auto-merge-on-pr ─────────────────────────────────
  test-enable-auto-merge-on-pr:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    if: >-
      startsWith(github.event_name, 'pull_request') &&
      (
        github.event.pull_request.user.login == 'dependabot[bot]' ||
        github.event.pull_request.user.login == 'renovate[bot]' ||
        github.event.pull_request.user.login == 'botantler[bot]' ||
        github.event.pull_request.user.login == 'devantler'
      )
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 🧪 Run enable-auto-merge-on-pr
        uses: ./enable-auto-merge-on-pr
        with:
          pr-number: ${{ github.event.pull_request.number }}
          dry-run: "true"

  # ── free-disk-space ─────────────────────────────────────────
  test-free-disk-space:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 🧪 Run free-disk-space
        id: disk
        uses: ./free-disk-space

      - name: ✅ Verify space was reclaimed
        shell: bash
        env:
          FREED: ${{ steps.disk.outputs.freed }}
          AVAILABLE: ${{ steps.disk.outputs.available }}
        run: |
          if [[ -z "$FREED" || -z "$AVAILABLE" ]]; then
            echo "::error::freed/available outputs are empty"
            exit 1
          fi
          # The default set removes ~11+ GB of toolchains; require a real gain so
          # a silently no-op'd reclaim (e.g. paths moved on a new runner image)
          # is caught rather than passing vacuously.
          if (( FREED < 1 )); then
            echo "::error::expected to reclaim >=1G, got ${FREED}G"
            exit 1
          fi
          echo "Reclaimed ${FREED}G; ${AVAILABLE}G free."

  # ── free-disk-space (all categories disabled → clean no-op) ──
  test-free-disk-space-keep:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # Disabling every category must be a clean no-op (0 G reclaimed), not an
      # error — exercises the "empty path list" branch and the false toggles.
      - name: 🧪 Run free-disk-space with all categories disabled
        id: disk
        uses: ./free-disk-space
        with:
          android: "false"
          dotnet: "false"
          haskell: "false"
          boost: "false"
          swift: "false"
          codeql: "false"
          pypy: "false"
          powershell: "false"
          miniconda: "false"

      - name: ✅ Verify no-op succeeded with outputs
        shell: bash
        env:
          FREED: ${{ steps.disk.outputs.freed }}
          AVAILABLE: ${{ steps.disk.outputs.available }}
        run: |
          if [[ -z "$FREED" || -z "$AVAILABLE" ]]; then
            echo "::error::freed/available outputs are empty"
            exit 1
          fi
          # Disabling every category removes nothing, so the reclaim MUST be 0 —
          # any non-zero value means the action deleted something it shouldn't.
          if (( FREED != 0 )); then
            echo "::error::expected freed=0 on the all-disabled no-op, got ${FREED}G"
            exit 1
          fi
          echo "No-op reclaim: freed=${FREED}G, available=${AVAILABLE}G"

  # ── login-to-ghcr ──────────────────────────────────────────
  test-login-to-ghcr:
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 🧪 Run login-to-ghcr
        uses: ./login-to-ghcr
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: ✅ Verify GHCR login
        run: cat ~/.docker/config.json | grep -q "ghcr.io"

  # ── aggregate-job-checks ────────────────────────────────────
  test-aggregate-job-checks-empty:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 🧪 Run aggregate-job-checks with empty job-results (should succeed)
        uses: ./aggregate-job-checks
        with:
          job-results: ""

  test-aggregate-job-checks-success:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 🧪 Run aggregate-job-checks with all-success results
        uses: ./aggregate-job-checks
        with:
          job-results: "success skipped success"

  test-aggregate-job-checks-failure:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 🧪 Run aggregate-job-checks with a failed job (expected to fail)
        id: check
        continue-on-error: true
        uses: ./aggregate-job-checks
        with:
          job-results: "success failure skipped"

      - name: ✅ Verify step failed as expected
        shell: bash
        env:
          OUTCOME: ${{ steps.check.outcome }}
        run: |
          if [[ "$OUTCOME" != "failure" ]]; then
            echo "::error::Expected the action to fail when a job failed, got: $OUTCOME"
            exit 1
          fi

  test-aggregate-job-checks-unknown:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 🧪 Run aggregate-job-checks with an unknown result (expected to fail)
        id: check
        continue-on-error: true
        uses: ./aggregate-job-checks
        with:
          job-results: "success unknown-status"

      - name: ✅ Verify step failed as expected
        shell: bash
        env:
          OUTCOME: ${{ steps.check.outcome }}
        run: |
          if [[ "$OUTCOME" != "failure" ]]; then
            echo "::error::Expected the action to fail on an unknown result, got: $OUTCOME"
            exit 1
          fi

  # ── run-dotnet-tests ────────────────────────────────────────
  test-run-dotnet-tests:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      packages: read
      code-quality: write # for the GitHub Code Quality coverage upload
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 🧪 Run run-dotnet-tests
        uses: ./run-dotnet-tests
        with:
          app-id: ${{ vars.APP_ID }}
          app-private-key: ${{ secrets.APP_PRIVATE_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: .github/fixtures/run-dotnet-tests

  # ── setup-agent-skills ────────────────────────────────────
  test-setup-agent-skills-inline:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 🧪 Run setup-agent-skills
        id: setup
        uses: ./setup-agent-skills
        with:
          skills: |
            github/awesome-copilot git-commit
            github/awesome-copilot conventional-commit

      - name: ✅ Verify both skills installed
        shell: bash
        env:
          INSTALLED: ${{ steps.setup.outputs.installed-skills }}
        run: |
          set -euo pipefail
          for expected in "github/awesome-copilot/git-commit" "github/awesome-copilot/conventional-commit"; do
            if [[ "$INSTALLED" != *"$expected"* ]]; then
              echo "::error::Expected '$expected' in installed-skills output, got: $INSTALLED"
              exit 1
            fi
          done
          for skill in git-commit conventional-commit; do
            if [[ ! -f ".agents/skills/${skill}/SKILL.md" ]]; then
              echo "::error::Expected .agents/skills/${skill}/SKILL.md to exist"
              find .agents/skills -maxdepth 3 -type f || true
              exit 1
            fi
            if ! grep -q '^    github-repo: https://github.com/github/awesome-copilot$' ".agents/skills/${skill}/SKILL.md"; then
              echo "::error::${skill} SKILL.md does not carry expected github-repo metadata"
              cat ".agents/skills/${skill}/SKILL.md"
              exit 1
            fi
          done

  test-setup-agent-skills-pinned:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 🧪 Run setup-agent-skills with @pin
        id: setup
        uses: ./setup-agent-skills
        with:
          skills: |
            github/awesome-copilot git-commit@8fbf6c4a798df51d1d1d8fd37a1aa7e94203109c

      - name: ✅ Verify pinned commit ended up in SKILL.md metadata
        shell: bash
        env:
          INSTALLED: ${{ steps.setup.outputs.installed-skills }}
        run: |
          set -euo pipefail
          if [[ "$INSTALLED" != *"github/awesome-copilot/git-commit@8fbf6c4a798df51d1d1d8fd37a1aa7e94203109c"* ]]; then
            echo "::error::Expected pinned entry in installed-skills output, got: $INSTALLED"
            exit 1
          fi
          skill_md=".agents/skills/git-commit/SKILL.md"
          if [[ ! -f "$skill_md" ]]; then
            echo "::error::Could not locate installed git-commit SKILL.md at $skill_md"
            find .agents/skills -maxdepth 3 -type f || true
            exit 1
          fi
          if ! grep -q '8fbf6c4a798df51d1d1d8fd37a1aa7e94203109c' "$skill_md"; then
            echo "::error::Installed skill metadata does not reference the pinned commit:"
            cat "$skill_md"
            exit 1
          fi

  test-setup-agent-skills-missing-input:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 🧪 Run setup-agent-skills with blank skills input (expected to fail)
        id: setup
        continue-on-error: true
        uses: ./setup-agent-skills
        with:
          skills: " \n# only a comment\n"

      - name: ✅ Verify step failed as expected
        shell: bash
        env:
          OUTCOME: ${{ steps.setup.outcome }}
        run: |
          if [[ "$OUTCOME" != "failure" ]]; then
            echo "::error::Expected the action to fail when 'skills' has no actionable entries, got: $OUTCOME"
            exit 1
          fi

  test-setup-agent-skills-malformed-line:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 🧪 Run setup-agent-skills with an extra token (expected to fail)
        id: setup
        continue-on-error: true
        uses: ./setup-agent-skills
        with:
          skills: |
            github/awesome-copilot git-commit extra-token

      - name: ✅ Verify step failed as expected
        shell: bash
        env:
          OUTCOME: ${{ steps.setup.outcome }}
        run: |
          if [[ "$OUTCOME" != "failure" ]]; then
            echo "::error::Expected the action to fail when a line has more than two tokens, got: $OUTCOME"
            exit 1
          fi

  test-setup-agent-skills-multi-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 🧪 Run setup-agent-skills for two agents
        id: setup
        uses: ./setup-agent-skills
        with:
          agents: |
            github-copilot
            claude-code
          skills: |
            github/awesome-copilot git-commit

      - name: ✅ Verify the skill installed for both agents
        shell: bash
        env:
          INSTALLED: ${{ steps.setup.outputs.installed-skills }}
        run: |
          set -euo pipefail
          # The skill is reported once regardless of how many agents it installed for.
          if [[ "$INSTALLED" != *"github/awesome-copilot/git-commit"* ]]; then
            echo "::error::Expected 'github/awesome-copilot/git-commit' in installed-skills output, got: $INSTALLED"
            exit 1
          fi
          # github-copilot installs to .agents/skills at project scope; claude-code installs to .claude/skills.
          for md in ".agents/skills/git-commit/SKILL.md" ".claude/skills/git-commit/SKILL.md"; do
            if [[ ! -f "$md" ]]; then
              echo "::error::Expected $md to exist (per-agent install)"
              find .agents/skills .claude/skills -maxdepth 3 -type f 2>/dev/null || true
              exit 1
            fi
          done

  # ── setup-go-toolchain ─────────────────────────────────────
  test-setup-go-toolchain:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 🧪 Run setup-go-toolchain
        id: setup-go
        uses: ./setup-go-toolchain
        with:
          go-version: stable

      - name: ✅ Verify Go is installed
        shell: bash
        run: go version

      - name: ✅ Verify output
        shell: bash
        env:
          GO_VERSION: ${{ steps.setup-go.outputs.go-version }}
        run: |
          if [[ -z "$GO_VERSION" ]]; then
            echo "::error::go-version output is empty"
            exit 1
          fi
          echo "Go version: $GO_VERSION"

  test-setup-go-toolchain-private-modules:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 🧪 Run setup-go-toolchain with token
        uses: ./setup-go-toolchain
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: ✅ Verify GOPRIVATE is set
        shell: bash
        run: |
          goprivate=$(go env GOPRIVATE)
          if [[ "$goprivate" != *"github.com/devantler-tech"* ]]; then
            echo "::error::GOPRIVATE not set correctly: $goprivate"
            exit 1
          fi
          echo "GOPRIVATE: $goprivate"

  # ── setup-ksail-cli ────────────────────────────────────────
  test-setup-ksail-cli:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 🧪 Run setup-ksail-cli
        uses: ./setup-ksail-cli

      - name: ✅ Verify ksail is installed
        shell: bash
        run: ksail --version

  # ── sync-github-labels ─────────────────────────────────────
  test-sync-github-labels:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 🧪 Run sync-github-labels
        uses: ./sync-github-labels
        with:
          config-file: .github/labels.yaml
          delete-other-labels: "false"

  # ── update-agent-skills ───────────────────────────────────
  test-update-agent-skills-noop:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 📦 Install a skill pinned to a historical commit
        uses: ./setup-agent-skills
        with:
          skills: |
            github/awesome-copilot git-commit@8fbf6c4a798df51d1d1d8fd37a1aa7e94203109c

      - name: 🔄 Run update-agent-skills (should be a no-op against a pinned skill)
        id: update
        uses: ./update-agent-skills
        with:
          dir: .agents/skills

      - name: ✅ Verify no-op
        shell: bash
        env:
          CHANGED: ${{ steps.update.outputs.changed }}
          UPDATED: ${{ steps.update.outputs.updated-skills }}
        run: |
          set -euo pipefail
          if [[ "$CHANGED" != "false" ]]; then
            echo "::error::Expected changed=false when all skills are pinned, got: $CHANGED"
            echo "updated-skills output: $UPDATED"
            exit 1
          fi
          if ! grep -q '8fbf6c4a798df51d1d1d8fd37a1aa7e94203109c' .agents/skills/git-commit/SKILL.md; then
            echo "::error::Pinned commit SHA was removed from SKILL.md metadata"
            cat .agents/skills/git-commit/SKILL.md
            exit 1
          fi

  test-update-agent-skills-dry-run:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 📦 Install a skill pinned to a historical commit
        uses: ./setup-agent-skills
        with:
          skills: |
            github/awesome-copilot git-commit@8fbf6c4a798df51d1d1d8fd37a1aa7e94203109c

      - name: 🔢 Snapshot SKILL.md hash before
        id: before
        shell: bash
        run: echo "sha=$(shasum -a 256 .agents/skills/git-commit/SKILL.md | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: 🔄 Run update-agent-skills with --unpin --dry-run
        id: update
        uses: ./update-agent-skills
        with:
          dir: .agents/skills
          unpin: "true"
          dry-run: "true"

      - name: ✅ Verify SKILL.md was not modified on disk
        shell: bash
        env:
          BEFORE: ${{ steps.before.outputs.sha }}
        run: |
          set -euo pipefail
          after=$(shasum -a 256 .agents/skills/git-commit/SKILL.md | awk '{print $1}')
          if [[ "$BEFORE" != "$after" ]]; then
            echo "::error::SKILL.md was modified despite --dry-run (before=$BEFORE after=$after)"
            exit 1
          fi

  test-update-agent-skills-missing-dir:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 🔄 Run update-agent-skills against a missing dir (expected to fail)
        id: update
        continue-on-error: true
        uses: ./update-agent-skills
        with:
          dir: does-not-exist

      - name: ✅ Verify step failed as expected
        shell: bash
        env:
          OUTCOME: ${{ steps.update.outcome }}
        run: |
          if [[ "$OUTCOME" != "failure" ]]; then
            echo "::error::Expected the action to fail on a missing directory, got: $OUTCOME"
            exit 1
          fi

  # ── upload-coverage ─────────────────────────────────────────
  test-upload-coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      code-quality: write
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # Smoke test: the action must wire up and run without crashing. The upload is best-effort
      # (fail-on-error: false) because GitHub Code Quality coverage must be enabled in repo settings
      # before reports are accepted — upload errors surface as annotations, not CI failures.
      - name: 🧪 Run upload-coverage
        uses: ./upload-coverage
        with:
          file: .github/fixtures/upload-coverage/coverage.cobertura.xml
          language: Go
          label: code-coverage/test
          fail-on-error: "false"

  # ── upsert-issue ────────────────────────────────────────────
  test-upsert-issue-create:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 🧪 Create or update an issue
        id: upsert
        uses: ./upsert-issue
        with:
          title: "[test] upsert-issue smoke test"
          body: |
            This issue is created by the `upsert-issue` test workflow.
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify outputs
        env:
          ISSUE_NUMBER: ${{ steps.upsert.outputs.issue-number }}
          ISSUE_URL: ${{ steps.upsert.outputs.issue-url }}
        run: |
          if [ -z "$ISSUE_NUMBER" ]; then
            echo "::error::issue-number output is empty"
            exit 1
          fi
          echo "Issue: $ISSUE_URL"

  test-upsert-issue-close:
    needs: [test-upsert-issue-create]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 🧪 Close the issue
        uses: ./upsert-issue
        with:
          title: "[test] upsert-issue smoke test"
          body: "Closed by test."
          open: "false"
          close-comment: "🧪 Closed by test workflow."
          github-token: ${{ secrets.GITHUB_TOKEN }}

  # ── sync-github-labels (negative path) ─────────────────────
  test-sync-github-labels-missing-config:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 🧪 Run sync-github-labels with a missing config file (expected to fail)
        id: sync
        continue-on-error: true
        uses: ./sync-github-labels
        with:
          config-file: .github/this-config-does-not-exist.yaml
          delete-other-labels: "false"

      - name: ✅ Verify step failed as expected
        shell: bash
        env:
          OUTCOME: ${{ steps.sync.outcome }}
        run: |
          if [[ "$OUTCOME" != "failure" ]]; then
            echo "::error::Expected the action to fail on a missing config file, got: $OUTCOME"
            exit 1
          fi

  # ── login-to-ghcr (negative path) ──────────────────────────
  test-login-to-ghcr-empty-token:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 🧪 Run login-to-ghcr with an empty token (expected to fail)
        id: login
        continue-on-error: true
        uses: ./login-to-ghcr
        with:
          github-token: ""

      - name: ✅ Verify step failed as expected
        shell: bash
        env:
          OUTCOME: ${{ steps.login.outcome }}
        run: |
          if [[ "$OUTCOME" != "failure" ]]; then
            echo "::error::Expected the action to fail with an empty github-token, got: $OUTCOME"
            exit 1
          fi

  # ── setup-go-toolchain (negative path) ─────────────────────
  test-setup-go-toolchain-invalid-version:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 🧪 Run setup-go-toolchain with a non-existent version (expected to fail)
        id: setup-go
        continue-on-error: true
        uses: ./setup-go-toolchain
        with:
          go-version: "99.99.99"

      - name: ✅ Verify step failed as expected
        shell: bash
        env:
          OUTCOME: ${{ steps.setup-go.outcome }}
        run: |
          if [[ "$OUTCOME" != "failure" ]]; then
            echo "::error::Expected the action to fail on a non-existent Go version, got: $OUTCOME"
            exit 1
          fi

  # ── upsert-issue (negative path) ───────────────────────────
  test-upsert-issue-missing-body:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 🧪 Run upsert-issue with neither body nor body-file (expected to fail)
        id: upsert
        continue-on-error: true
        uses: ./upsert-issue
        with:
          title: "[test] upsert-issue missing-body negative test"

      - name: ✅ Verify step failed as expected
        shell: bash
        env:
          OUTCOME: ${{ steps.upsert.outcome }}
        run: |
          if [[ "$OUTCOME" != "failure" ]]; then
            echo "::error::Expected the action to fail when neither body nor body-file is provided, got: $OUTCOME"
            exit 1
          fi

  # ── run-dotnet-tests (negative path) ───────────────────────
  test-run-dotnet-tests-missing-working-directory:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 🧪 Run run-dotnet-tests against a non-existent working-directory (expected to fail)
        id: dotnet
        continue-on-error: true
        uses: ./run-dotnet-tests
        with:
          app-id: ${{ vars.APP_ID }}
          app-private-key: ${{ secrets.APP_PRIVATE_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: does-not-exist

      - name: ✅ Verify step failed as expected
        shell: bash
        env:
          OUTCOME: ${{ steps.dotnet.outcome }}
        run: |
          if [[ "$OUTCOME" != "failure" ]]; then
            echo "::error::Expected the action to fail on a non-existent working-directory, got: $OUTCOME"
            exit 1
          fi

  # ── zizmor ──────────────────────────────────────────────────
  zizmor:
    runs-on: ubuntu-latest
    if: github.event_name != 'push'
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 🔒 Run zizmor
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6

  # ── lint-readme-parity ──────────────────────────────────────
  lint-readme-parity:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 📋 Check README ↔ action.yaml input/output parity
        shell: bash
        run: |
          # Bidirectional README <-> action.yaml input/output parity check:
          #   forward — every input/output declared in an action.yaml must appear
          #             in its README's ## Inputs / ## Outputs table; and
          #   reverse — every name in those README tables must be a declared
          #             input/output (catches rows left stale by a rename/removal).
          # yq is preinstalled on the GitHub-hosted ubuntu-latest runner image.
          status=0

          # Section body between '## <heading>' and the next '## ' heading.
          section() { awk -v h="$1" '/^## /{f=0} f; $0 ~ "^## " h "$" {f=1}' "$2"; }
          # First-column names from the markdown table under '## <heading>'
          # (skips the header row and the |---|---| separator row).
          table_names() {
            awk -v h="$1" '
              /^## / {f=0}
              $0 ~ "^## " h "$" {f=1; next}
              f && /^[ \t]*\|/ {
                if ($0 ~ /^[ \t]*\|[ :|-]+\|?[ \t]*$/) next
                line=$0; sub(/^[ \t]*\|/,"",line); split(line,a,"|"); cell=a[1]
                gsub(/[`* \t]/,"",cell)
                if (cell!="" && cell!="Input" && cell!="Output" && cell!="Name") print cell
              }' "$2"
          }

          for action_yaml in */action.yaml; do
            dir="$(dirname "$action_yaml")"
            readme="$dir/README.md"
            if [[ ! -f "$readme" ]]; then
              echo "::error file=$dir::missing README.md"
              status=1
              continue
            fi
            inputs_doc="$(section Inputs "$readme")"
            outputs_doc="$(section Outputs "$readme")"
            declared_in="$(yq -r '.inputs // {} | keys | .[]' "$action_yaml")"
            declared_out="$(yq -r '.outputs // {} | keys | .[]' "$action_yaml")"

            # forward: declared -> documented
            while IFS= read -r name; do
              [[ -z "$name" ]] && continue
              if ! grep -qF "\`$name\`" <<<"$inputs_doc"; then
                echo "::error file=$action_yaml::input '$name' is declared in action.yaml but not documented in $readme (## Inputs)"
                status=1
              fi
            done <<<"$declared_in"
            while IFS= read -r name; do
              [[ -z "$name" ]] && continue
              if ! grep -qF "\`$name\`" <<<"$outputs_doc"; then
                echo "::error file=$action_yaml::output '$name' is declared in action.yaml but not documented in $readme (## Outputs)"
                status=1
              fi
            done <<<"$declared_out"

            # reverse: documented -> declared
            while IFS= read -r name; do
              [[ -z "$name" ]] && continue
              if ! grep -qxF "$name" <<<"$declared_in"; then
                echo "::error file=$readme::'$name' is documented in ## Inputs but not declared in $action_yaml"
                status=1
              fi
            done < <(table_names Inputs "$readme")
            while IFS= read -r name; do
              [[ -z "$name" ]] && continue
              if ! grep -qxF "$name" <<<"$declared_out"; then
                echo "::error file=$readme::'$name' is documented in ## Outputs but not declared in $action_yaml"
                status=1
              fi
            done < <(table_names Outputs "$readme")
          done

          if [[ "$status" -eq 0 ]]; then
            echo "README parity OK: every declared input/output is documented and every documented row is declared."
          fi
          exit "$status"

  # ── gate ────────────────────────────────────────────────────
  ci-required-checks:
    name: CI - Required Checks
    if: ${{ always() }}
    needs:
      - test-approve-pr
      - test-cleanup-ghcr-packages
      - test-create-issues-from-todos
      - test-enable-auto-merge-on-pr
      - test-free-disk-space
      - test-free-disk-space-keep
      - test-login-to-ghcr
      - test-aggregate-job-checks-empty
      - test-aggregate-job-checks-success
      - test-aggregate-job-checks-failure
      - test-aggregate-job-checks-unknown
      - test-run-dotnet-tests
      - test-setup-agent-skills-inline
      - test-setup-agent-skills-pinned
      - test-setup-agent-skills-missing-input
      - test-setup-agent-skills-malformed-line
      - test-setup-agent-skills-multi-agent
      - test-setup-go-toolchain
      - test-setup-go-toolchain-private-modules
      - test-setup-ksail-cli
      - test-sync-github-labels
      - test-update-agent-skills-noop
      - test-update-agent-skills-dry-run
      - test-update-agent-skills-missing-dir
      - test-upload-coverage
      - test-upsert-issue-create
      - test-upsert-issue-close
      - test-sync-github-labels-missing-config
      - test-login-to-ghcr-empty-token
      - test-setup-go-toolchain-invalid-version
      - test-upsert-issue-missing-body
      - test-run-dotnet-tests-missing-working-directory
      - zizmor
      - lint-readme-parity
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: ./aggregate-job-checks
        with:
          job-results: >-
            ${{ needs.test-approve-pr.result }}
            ${{ needs.test-cleanup-ghcr-packages.result }}
            ${{ needs.test-create-issues-from-todos.result }}
            ${{ needs.test-enable-auto-merge-on-pr.result }}
            ${{ needs.test-login-to-ghcr.result }}
            ${{ needs.test-aggregate-job-checks-empty.result }}
            ${{ needs.test-aggregate-job-checks-success.result }}
            ${{ needs.test-aggregate-job-checks-failure.result }}
            ${{ needs.test-aggregate-job-checks-unknown.result }}
            ${{ needs.test-run-dotnet-tests.result }}
            ${{ needs.test-setup-agent-skills-inline.result }}
            ${{ needs.test-setup-agent-skills-pinned.result }}
            ${{ needs.test-setup-agent-skills-missing-input.result }}
            ${{ needs.test-setup-agent-skills-malformed-line.result }}
            ${{ needs.test-setup-agent-skills-multi-agent.result }}
            ${{ needs.test-setup-go-toolchain.result }}
            ${{ needs.test-setup-go-toolchain-private-modules.result }}
            ${{ needs.test-setup-ksail-cli.result }}
            ${{ needs.test-sync-github-labels.result }}
            ${{ needs.test-update-agent-skills-noop.result }}
            ${{ needs.test-update-agent-skills-dry-run.result }}
            ${{ needs.test-update-agent-skills-missing-dir.result }}
            ${{ needs.test-upload-coverage.result }}
            ${{ needs.test-upsert-issue-create.result }}
            ${{ needs.test-upsert-issue-close.result }}
            ${{ needs.test-sync-github-labels-missing-config.result }}
            ${{ needs.test-login-to-ghcr-empty-token.result }}
            ${{ needs.test-setup-go-toolchain-invalid-version.result }}
            ${{ needs.test-upsert-issue-missing-body.result }}
            ${{ needs.test-run-dotnet-tests-missing-working-directory.result }}
            ${{ needs.zizmor.result }}
            ${{ needs.lint-readme-parity.result }}
