name: 🧪 CI

on:
  pull_request:
  push:
    branches: [main]
  merge_group:

permissions: {}

concurrency:
  group: "ci-${{ github.event.number || github.sha }}"
  cancel-in-progress: true

jobs:
  # Every job below is guarded so the whole CI suite is skipped for a release-please
  # release commit — BOTH the release-please PR (head branch `release-please--*`) AND
  # the push of the squashed release commit to `main` (`chore(main): release …`, where
  # `github.head_ref` is empty so the branch-name check alone misses it). Those commits
  # only bump versions + the changelog — already tested in the PRs that introduced each
  # change — so there is nothing new to test. The `CI - Required Checks` gate still
  # runs (aggregate-job-checks treats skipped as success), keeping the required status
  # check green so the release auto-merges.
  # ── approve-pr ──────────────────────────────────────────────
  test-approve-pr:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    if: >-
      !startsWith(github.head_ref, 'release-please--') && !startsWith(github.event.head_commit.message, 'chore(main): release ') &&
      startsWith(github.event_name, 'pull_request') &&
      (
        github.event.pull_request.user.login == 'dependabot[bot]' ||
        github.event.pull_request.user.login == 'renovate[bot]' ||
        github.event.pull_request.user.login == 'botantler[bot]' ||
        github.event.pull_request.user.login == 'devantler'
      )
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: 🧪 Run approve-pr
        uses: ./approve-pr
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          app-private-key: ${{ secrets.APP_PRIVATE_KEY }}
          pr-number: ${{ github.event.pull_request.number }}

  # ── cleanup-ghcr-packages ───────────────────────────────────
  test-cleanup-ghcr-packages:
    if: "${{ !startsWith(github.head_ref, 'release-please--') && !startsWith(github.event.head_commit.message, 'chore(main): release ') }}"
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Dry run against a stable, long-lived package so the test exercises the
      # action's wiring without ever deleting anything.
      - name: 🧪 Run cleanup-ghcr-packages (dry run)
        uses: ./cleanup-ghcr-packages
        with:
          package: pandoc-plus
          dry-run: "true"

  # ── create-issues-from-todos ────────────────────────────────
  test-create-issues-from-todos:
    if: "${{ !startsWith(github.head_ref, 'release-please--') && !startsWith(github.event.head_commit.message, 'chore(main): release ') }}"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: 🔒 Assert TODO action retries locally
        shell: bash
        run: |
          action_file="$GITHUB_WORKSPACE/create-issues-from-todos/action.yaml"
          if grep -Eq '^[[:space:]]*-[[:space:]]*uses:[[:space:]]*Wandalen/wretry\.action@' "$action_file"; then
            echo "::error::create-issues-from-todos must not depend on the external retry wrapper; it expands to an unpinned nested action ref in consumers with full-SHA policies."
            exit 1
          fi
          grep -qF ".scripts/retry.sh" "$action_file" || {
            echo "::error::create-issues-from-todos must use the bundled retry helper."
            exit 1
          }
          grep -qF "retry_helper=\"\${RUNNER_TEMP}/devantler-actions-retry.sh\"" "$action_file" || {
            echo "::error::create-issues-from-todos must preserve retry.sh outside the action checkout."
            exit 1
          }
          grep -qF "retry() { bash \"\${RUNNER_TEMP}/devantler-actions-retry.sh\" \"\$@\"; }" "$action_file" || {
            echo "::error::create-issues-from-todos must invoke the preserved retry helper."
            exit 1
          }
          grep -qF "ghcr.io/alstr/todo-to-issue-action:v5.1.15" "$action_file" || {
            echo "::error::create-issues-from-todos must keep the pinned todo-to-issue container image floor."
            exit 1
          }

      - name: 🧪 Run create-issues-from-todos
        uses: ./create-issues-from-todos
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          app-private-key: ${{ secrets.APP_PRIVATE_KEY }}
          project: organization/devantler-tech/5

  # ── dependency-review ───────────────────────────────────────
  test-dependency-review:
    runs-on: ubuntu-latest
    # The underlying action only produces a diff on pull_request events; on push /
    # merge_group there is no PR to review, so the test is PR-gated (skipped
    # otherwise, which aggregate-job-checks tolerates — like test-approve-pr).
    if: "${{ !startsWith(github.head_ref, 'release-please--') && !startsWith(github.event.head_commit.message, 'chore(main): release ') && startsWith(github.event_name, 'pull_request') }}"
    permissions:
      contents: read
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # warn-only defaults to true, so this exercises the action's wiring on the
      # real PR diff without ever failing CI on a finding in this repo's own deps.
      - name: 🧪 Run dependency-review
        id: review
        uses: ./dependency-review

      - name: ✅ Verify the review ran and produced outputs
        shell: bash
        env:
          CHANGES: ${{ steps.review.outputs.dependency-changes }}
        run: |
          # dependency-changes is always emitted (JSON, "[]" when nothing changed);
          # an empty value means the action never ran / its wiring is broken.
          if [[ -z "$CHANGES" ]]; then
            echo "::error::dependency-changes output is empty — the action did not run"
            exit 1
          fi
          echo "Dependency review ran; dependency-changes=${CHANGES}"

  # ── diagnose-flux ───────────────────────────────────────────
  test-diagnose-flux:
    if: "${{ !startsWith(github.head_ref, 'release-please--') && !startsWith(github.event.head_commit.message, 'chore(main): release ') }}"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Put the committed fake kubectl on PATH so the composite runs hermetically
      # (no real cluster). Its REAL jq failing-pod selection then runs against the
      # fixture pod list, so a regression in that logic fails this test.
      - name: 🔧 Put fake kubectl on PATH
        shell: bash
        run: echo "$GITHUB_WORKSPACE/.github/tests/diagnose-flux/bin" >> "$GITHUB_PATH"

      - name: 🧪 Run diagnose-flux against the fake cluster
        uses: ./diagnose-flux

      - name: ✅ Assert crash + Job pods were dumped, healthy was not
        shell: bash
        run: |
          logged="$RUNNER_TEMP/logged-pods.txt"
          if [[ ! -f "$logged" ]]; then
            echo "::error::diagnose-flux dumped no pod logs — the jq failing-pod selection is broken"
            exit 1
          fi
          for want in crasher jobpod; do
            if ! grep -qx "$want" "$logged"; then
              echo "::error::expected pod '$want' to be dumped but it was not"; cat "$logged"; exit 1
            fi
          done
          if grep -qx healthy "$logged"; then
            echo "::error::healthy pod was dumped — the failing-pod selection is too broad"; cat "$logged"; exit 1
          fi
          echo "diagnose-flux dumped crasher + jobpod and skipped healthy — OK"
  # ── enable-auto-merge-on-pr ─────────────────────────────────
  test-enable-auto-merge-on-pr:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    if: >-
      !startsWith(github.head_ref, 'release-please--') && !startsWith(github.event.head_commit.message, 'chore(main): release ') &&
      startsWith(github.event_name, 'pull_request') &&
      (
        github.event.pull_request.user.login == 'dependabot[bot]' ||
        github.event.pull_request.user.login == 'renovate[bot]' ||
        github.event.pull_request.user.login == 'botantler[bot]' ||
        github.event.pull_request.user.login == 'devantler'
      )
    steps:
      # Never execute this privileged local action from the PR merge commit: an
      # allowlisted PR can modify action.yaml and otherwise inherit this job's
      # write-scoped GITHUB_TOKEN. Load the implementation from the trusted base.
      - name: 📑 Checkout trusted action
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: .trusted-actions
          persist-credentials: false

      - name: 🧪 Run enable-auto-merge-on-pr
        uses: ./.trusted-actions/enable-auto-merge-on-pr
        with:
          pr-number: ${{ github.event.pull_request.number }}
          dry-run: "true"

  # ── free-disk-space ─────────────────────────────────────────
  test-free-disk-space:
    if: "${{ !startsWith(github.head_ref, 'release-please--') && !startsWith(github.event.head_commit.message, 'chore(main): release ') }}"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: 🧪 Run free-disk-space
        id: disk
        uses: ./free-disk-space

      - name: ✅ Verify space was reclaimed
        shell: bash
        env:
          FREED: ${{ steps.disk.outputs.freed }}
          AVAILABLE: ${{ steps.disk.outputs.available }}
        run: |
          if [[ -z "$FREED" || -z "$AVAILABLE" ]]; then
            echo "::error::freed/available outputs are empty"
            exit 1
          fi
          # The default set removes ~11+ GB of toolchains; require a real gain so
          # a silently no-op'd reclaim (e.g. paths moved on a new runner image)
          # is caught rather than passing vacuously.
          if (( FREED < 1 )); then
            echo "::error::expected to reclaim >=1G, got ${FREED}G"
            exit 1
          fi
          echo "Reclaimed ${FREED}G; ${AVAILABLE}G free."

  # ── free-disk-space (all categories disabled → clean no-op) ──
  test-free-disk-space-keep:
    if: "${{ !startsWith(github.head_ref, 'release-please--') && !startsWith(github.event.head_commit.message, 'chore(main): release ') }}"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Disabling every category must be a clean no-op (0 G reclaimed), not an
      # error — exercises the "empty path list" branch and the false toggles.
      - name: 🧪 Run free-disk-space with all categories disabled
        id: disk
        uses: ./free-disk-space
        with:
          android: "false"
          dotnet: "false"
          haskell: "false"
          boost: "false"
          swift: "false"
          codeql: "false"
          pypy: "false"
          powershell: "false"
          miniconda: "false"

      - name: ✅ Verify no-op succeeded with outputs
        shell: bash
        env:
          FREED: ${{ steps.disk.outputs.freed }}
          AVAILABLE: ${{ steps.disk.outputs.available }}
        run: |
          if [[ -z "$FREED" || -z "$AVAILABLE" ]]; then
            echo "::error::freed/available outputs are empty"
            exit 1
          fi
          # Disabling every category removes nothing, so the reclaim MUST be 0 —
          # any non-zero value means the action deleted something it shouldn't.
          if (( FREED != 0 )); then
            echo "::error::expected freed=0 on the all-disabled no-op, got ${FREED}G"
            exit 1
          fi
          echo "No-op reclaim: freed=${FREED}G, available=${AVAILABLE}G"

  # ── login-to-ghcr ──────────────────────────────────────────
  test-login-to-ghcr:
    if: "${{ !startsWith(github.head_ref, 'release-please--') && !startsWith(github.event.head_commit.message, 'chore(main): release ') }}"
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: 🧪 Run login-to-ghcr
        uses: ./login-to-ghcr
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: ✅ Verify GHCR login
        run: cat ~/.docker/config.json | grep -q "ghcr.io"

  # ── aggregate-job-checks ────────────────────────────────────
  test-aggregate-job-checks-empty:
    if: "${{ !startsWith(github.head_ref, 'release-please--') && !startsWith(github.event.head_commit.message, 'chore(main): release ') }}"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: 🧪 Run aggregate-job-checks with empty job-results (should succeed)
        uses: ./aggregate-job-checks
        with:
          job-results: ""

  test-aggregate-job-checks-success:
    if: "${{ !startsWith(github.head_ref, 'release-please--') && !startsWith(github.event.head_commit.message, 'chore(main): release ') }}"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: 🧪 Run aggregate-job-checks with all-success results
        uses: ./aggregate-job-checks
        with:
          job-results: "success skipped success"

  test-aggregate-job-checks-failure:
    if: "${{ !startsWith(github.head_ref, 'release-please--') && !startsWith(github.event.head_commit.message, 'chore(main): release ') }}"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: 🧪 Run aggregate-job-checks with a failed job (expected to fail)
        id: check
        continue-on-error: true
        uses: ./aggregate-job-checks
        with:
          job-results: "success failure skipped"

      - name: ✅ Verify step failed as expected
        shell: bash
        env:
          OUTCOME: ${{ steps.check.outcome }}
        run: |
          if [[ "$OUTCOME" != "failure" ]]; then
            echo "::error::Expected the action to fail when a job failed, got: $OUTCOME"
            exit 1
          fi

  test-aggregate-job-checks-unknown:
    if: "${{ !startsWith(github.head_ref, 'release-please--') && !startsWith(github.event.head_commit.message, 'chore(main): release ') }}"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: 🧪 Run aggregate-job-checks with an unknown result (expected to fail)
        id: check
        continue-on-error: true
        uses: ./aggregate-job-checks
        with:
          job-results: "success unknown-status"

      - name: ✅ Verify step failed as expected
        shell: bash
        env:
          OUTCOME: ${{ steps.check.outcome }}
        run: |
          if [[ "$OUTCOME" != "failure" ]]; then
            echo "::error::Expected the action to fail on an unknown result, got: $OUTCOME"
            exit 1
          fi

  # ── run-dotnet-tests ────────────────────────────────────────
  test-run-dotnet-tests:
    if: "${{ !startsWith(github.head_ref, 'release-please--') && !startsWith(github.event.head_commit.message, 'chore(main): release ') }}"
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      packages: read
      code-quality: write # for the GitHub Code Quality coverage upload
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: 🧪 Run run-dotnet-tests
        uses: ./run-dotnet-tests
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: .github/fixtures/run-dotnet-tests

  # ── setup-agent-skills ────────────────────────────────────
  test-setup-agent-skills-inline:
    if: "${{ !startsWith(github.head_ref, 'release-please--') && !startsWith(github.event.head_commit.message, 'chore(main): release ') }}"
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: 🧪 Run setup-agent-skills
        id: setup
        uses: ./setup-agent-skills
        with:
          skills: |
            github/awesome-copilot git-commit
            github/awesome-copilot conventional-commit

      - name: ✅ Verify both skills installed
        shell: bash
        env:
          INSTALLED: ${{ steps.setup.outputs.installed-skills }}
        run: |
          set -euo pipefail
          for expected in "github/awesome-copilot/git-commit" "github/awesome-copilot/conventional-commit"; do
            if [[ "$INSTALLED" != *"$expected"* ]]; then
              echo "::error::Expected '$expected' in installed-skills output, got: $INSTALLED"
              exit 1
            fi
          done
          for skill in git-commit conventional-commit; do
            if [[ ! -f ".agents/skills/${skill}/SKILL.md" ]]; then
              echo "::error::Expected .agents/skills/${skill}/SKILL.md to exist"
              find .agents/skills -maxdepth 3 -type f || true
              exit 1
            fi
            if ! grep -q '^    github-repo: https://github.com/github/awesome-copilot$' ".agents/skills/${skill}/SKILL.md"; then
              echo "::error::${skill} SKILL.md does not carry expected github-repo metadata"
              cat ".agents/skills/${skill}/SKILL.md"
              exit 1
            fi
          done

  test-setup-agent-skills-pinned:
    if: "${{ !startsWith(github.head_ref, 'release-please--') && !startsWith(github.event.head_commit.message, 'chore(main): release ') }}"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: 🧪 Run setup-agent-skills with @pin
        id: setup
        uses: ./setup-agent-skills
        with:
          skills: |
            github/awesome-copilot git-commit@8fbf6c4a798df51d1d1d8fd37a1aa7e94203109c

      - name: ✅ Verify pinned commit ended up in SKILL.md metadata
        shell: bash
        env:
          INSTALLED: ${{ steps.setup.outputs.installed-skills }}
        run: |
          set -euo pipefail
          if [[ "$INSTALLED" != *"github/awesome-copilot/git-commit@8fbf6c4a798df51d1d1d8fd37a1aa7e94203109c"* ]]; then
            echo "::error::Expected pinned entry in installed-skills output, got: $INSTALLED"
            exit 1
          fi
          skill_md=".agents/skills/git-commit/SKILL.md"
          if [[ ! -f "$skill_md" ]]; then
            echo "::error::Could not locate installed git-commit SKILL.md at $skill_md"
            find .agents/skills -maxdepth 3 -type f || true
            exit 1
          fi
          if ! grep -q '8fbf6c4a798df51d1d1d8fd37a1aa7e94203109c' "$skill_md"; then
            echo "::error::Installed skill metadata does not reference the pinned commit:"
            cat "$skill_md"
            exit 1
          fi

  test-setup-agent-skills-missing-input:
    if: "${{ !startsWith(github.head_ref, 'release-please--') && !startsWith(github.event.head_commit.message, 'chore(main): release ') }}"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: 🧪 Run setup-agent-skills with blank skills input (expected to fail)
        id: setup
        continue-on-error: true
        uses: ./setup-agent-skills
        with:
          skills: " \n# only a comment\n"

      - name: ✅ Verify step failed as expected
        shell: bash
        env:
          OUTCOME: ${{ steps.setup.outcome }}
        run: |
          if [[ "$OUTCOME" != "failure" ]]; then
            echo "::error::Expected the action to fail when 'skills' has no actionable entries, got: $OUTCOME"
            exit 1
          fi

  test-setup-agent-skills-malformed-line:
    if: "${{ !startsWith(github.head_ref, 'release-please--') && !startsWith(github.event.head_commit.message, 'chore(main): release ') }}"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: 🧪 Run setup-agent-skills with an extra token (expected to fail)
        id: setup
        continue-on-error: true
        uses: ./setup-agent-skills
        with:
          skills: |
            github/awesome-copilot git-commit extra-token

      - name: ✅ Verify step failed as expected
        shell: bash
        env:
          OUTCOME: ${{ steps.setup.outcome }}
        run: |
          if [[ "$OUTCOME" != "failure" ]]; then
            echo "::error::Expected the action to fail when a line has more than two tokens, got: $OUTCOME"
            exit 1
          fi

  test-setup-agent-skills-multi-agent:
    if: "${{ !startsWith(github.head_ref, 'release-please--') && !startsWith(github.event.head_commit.message, 'chore(main): release ') }}"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: 🧪 Run setup-agent-skills for two agents
        id: setup
        uses: ./setup-agent-skills
        with:
          agents: |
            github-copilot
            claude-code
          skills: |
            github/awesome-copilot git-commit

      - name: ✅ Verify the skill installed for both agents
        shell: bash
        env:
          INSTALLED: ${{ steps.setup.outputs.installed-skills }}
        run: |
          set -euo pipefail
          # The skill is reported once regardless of how many agents it installed for.
          if [[ "$INSTALLED" != *"github/awesome-copilot/git-commit"* ]]; then
            echo "::error::Expected 'github/awesome-copilot/git-commit' in installed-skills output, got: $INSTALLED"
            exit 1
          fi
          # github-copilot installs to .agents/skills at project scope; claude-code installs to .claude/skills.
