  # ── .scripts/retry.sh (shared reliability helper) ──────────
  test-retry-script:
    if: "${{ !startsWith(github.head_ref, 'release-please--') && !startsWith(github.event.head_commit.message, 'chore(main): release ') }}"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: 🧪 Exercise retry.sh (success, retry-then-succeed, exhaust, no-arg, backoff)
        shell: bash
        env:
          RETRY_BASE_DELAY: "0" # keep the test fast — no real backoff sleeps
        run: |
          set -uo pipefail
          retry="$GITHUB_WORKSPACE/.scripts/retry.sh"

          # 1. Succeeds on the first try → exit 0, no retries.
          RETRY_MAX_ATTEMPTS=3 bash "$retry" true
          echo "✅ success-first-try: exit 0 as expected"

          # 2. Flaky command (fails twice, succeeds on the 3rd attempt) → exit 0.
          counter="$(mktemp)"
          printf '0' > "$counter"
          flaky="$(mktemp)"
          cat > "$flaky" <<EOF
          #!/usr/bin/env bash
          n=\$(cat "$counter")
          n=\$((n + 1))
          printf '%s' "\$n" > "$counter"
          [ "\$n" -ge 3 ]
          EOF
          chmod +x "$flaky"
          RETRY_MAX_ATTEMPTS=3 bash "$retry" "$flaky"
          attempts="$(cat "$counter")"
          if [ "$attempts" -ne 3 ]; then
            echo "::error::expected 3 attempts before success, got $attempts"; exit 1
          fi
          echo "✅ retry-then-succeed: succeeded on attempt 3 as expected"

          # 3. Always fails → exits non-zero with the command's status after N attempts.
          set +e
          RETRY_MAX_ATTEMPTS=2 bash "$retry" false
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            echo "::error::expected non-zero exit after exhausting attempts, got 0"; exit 1
          fi
          echo "✅ exhaust-and-fail: non-zero exit ($status) as expected"

          # 4. No command given → usage error (exit 2).
          set +e
          bash "$retry"
          status=$?
          set -e
          if [ "$status" -ne 2 ]; then
            echo "::error::expected exit 2 for missing command, got $status"; exit 1
          fi
          echo "✅ no-arg: exit 2 as expected"

          # 5. Backoff doubles each retry then clamps at RETRY_MAX_DELAY, and the
          #    final (exhausting) attempt does not sleep. Cases 1-4 run with the
          #    step-level RETRY_BASE_DELAY=0, so the doubling (retry.sh L50) and the
          #    cap clamp (L51-53) are otherwise never exercised. Intercept `sleep`
          #    with a fake on PATH that records its argument and returns instantly,
          #    so the real backoff sequence is asserted without any wall-clock wait.
          fakebin="$(mktemp -d)"
          sleeplog="$(mktemp)"
          cat > "$fakebin/sleep" <<EOF
          #!/usr/bin/env bash
          printf '%s\n' "\$1" >> "$sleeplog"
          EOF
          chmod +x "$fakebin/sleep"
          set +e
          PATH="$fakebin:$PATH" RETRY_MAX_ATTEMPTS=5 RETRY_BASE_DELAY=10 RETRY_MAX_DELAY=30 \
            bash "$retry" false
          set -e
          got="$(tr '\n' ' ' < "$sleeplog")"
          # 5 attempts → 4 sleeps: 10, 20 (doubling), then 40→30 and 60→30 (clamped).
          if [ "$got" != "10 20 30 30 " ]; then
            echo "::error::expected backoff '10 20 30 30 ', got '$got'"; exit 1
          fi
          echo "✅ backoff: doubles 10→20 then clamps at RETRY_MAX_DELAY=30 (no sleep on last attempt)"
          rm -rf "$fakebin"
          rm -f "$sleeplog"

          rm -f "$counter" "$flaky"

  # ── .scripts/ensure-gh-skill.sh (shared gh-skill bootstrap) ─
  test-ensure-gh-skill-script:
    if: "${{ !startsWith(github.head_ref, 'release-please--') && !startsWith(github.event.head_commit.message, 'chore(main): release ') }}"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: 🧪 Exercise ensure-gh-skill.sh (guards, fast-return, platform/arch errors)
        shell: bash
        run: |
          set -uo pipefail
          script="$GITHUB_WORKSPACE/.scripts/ensure-gh-skill.sh"

          # 0. Script parses cleanly.
          bash -n "$script"
          echo "✅ syntax: parses cleanly"

          # 1. Missing REQUIRED → guard fires with an actionable, non-zero exit.
          set +e
          out=$(unset REQUIRED; INSTALL_NAMESPACE=t bash "$script" 2>&1); status=$?
          set -e
          if [ "$status" -eq 0 ] || ! printf '%s' "$out" | grep -q "REQUIRED"; then
            echo "::error::expected REQUIRED guard to fail; status=$status out=$out"; exit 1
          fi
          echo "✅ missing-REQUIRED: guarded as expected"

          # 2. Missing INSTALL_NAMESPACE → guard fires.
          set +e
          out=$(unset INSTALL_NAMESPACE; REQUIRED=2.81.0 bash "$script" 2>&1); status=$?
          set -e
          if [ "$status" -eq 0 ] || ! printf '%s' "$out" | grep -q "INSTALL_NAMESPACE"; then
            echo "::error::expected INSTALL_NAMESPACE guard to fail; status=$status out=$out"; exit 1
          fi
          echo "✅ missing-INSTALL_NAMESPACE: guarded as expected"

          # Fake skill-capable gh whose version satisfies REQUIRED (no network used).
          okbin=$(mktemp -d)
          cat > "$okbin/gh" <<'EOF'
          #!/usr/bin/env bash
          case "$1" in
            --version) echo "gh version 2.81.0 (2026-01-01)"; echo "https://github.com/cli/cli/releases/tag/v2.81.0" ;;
            skill) exit 0 ;;
            *) exit 0 ;;
          esac
          EOF
          chmod +x "$okbin/gh"

          # 3. gh already supports skill and satisfies REQUIRED → fast-return, no install.
          out=$(PATH="$okbin:$PATH" REQUIRED=2.0.0 INSTALL_NAMESPACE=t bash "$script" 2>&1)
          if ! printf '%s' "$out" | grep -q "already supports"; then
            echo "::error::expected fast-return 'already supports'; out=$out"; exit 1
          fi
          echo "✅ satisfied: fast-returns without installing"

          # 4. Unparseable gh --version output → 'could not determine version' error.
          badver=$(mktemp -d)
          cat > "$badver/gh" <<'EOF'
          #!/usr/bin/env bash
          case "$1" in
            --version) echo "not a version line" ;;
            skill) exit 0 ;;
            *) exit 0 ;;
          esac
          EOF
          chmod +x "$badver/gh"
          set +e
          out=$(PATH="$badver:$PATH" REQUIRED=2.0.0 INSTALL_NAMESPACE=t bash "$script" 2>&1); status=$?
          set -e
          if [ "$status" -eq 0 ] || ! printf '%s' "$out" | grep -q "Could not determine"; then
            echo "::error::expected version-parse error; status=$status out=$out"; exit 1
          fi
          echo "✅ unparseable-version: errored as expected"

          # Fake gh WITHOUT skill support → forces fall-through to the install path,
          # where platform/arch are validated before any network download.
          noskill=$(mktemp -d)
          cat > "$noskill/gh" <<'EOF'
          #!/usr/bin/env bash
          case "$1" in
            skill) exit 1 ;;
            *) exit 0 ;;
          esac
          EOF
          chmod +x "$noskill/gh"

          # 5. Unsupported OS (Windows) → actionable error, before any network call.
          win=$(mktemp -d); cp "$noskill/gh" "$win/gh"
          cat > "$win/uname" <<'EOF'
          #!/usr/bin/env bash
          [ "$1" = "-s" ] && { echo "MINGW64_NT-10.0"; exit 0; }
          echo x86_64
          EOF
          chmod +x "$win/uname"
          set +e
          out=$(PATH="$win:$PATH" REQUIRED=999.0.0 INSTALL_NAMESPACE=t bash "$script" 2>&1); status=$?
          set -e
          if [ "$status" -eq 0 ] || ! printf '%s' "$out" | grep -q "only supported on Linux and macOS"; then
            echo "::error::expected unsupported-platform error; status=$status out=$out"; exit 1
          fi
          echo "✅ unsupported-platform: errored before download"

          # 6. Unsupported arch → actionable error, before any network call.
          badarch=$(mktemp -d); cp "$noskill/gh" "$badarch/gh"
          cat > "$badarch/uname" <<'EOF'
          #!/usr/bin/env bash
          [ "$1" = "-s" ] && { echo Linux; exit 0; }
          echo sparc64
          EOF
          chmod +x "$badarch/uname"
          set +e
          out=$(PATH="$badarch:$PATH" REQUIRED=999.0.0 INSTALL_NAMESPACE=t bash "$script" 2>&1); status=$?
          set -e
          if [ "$status" -eq 0 ] || ! printf '%s' "$out" | grep -q "Unsupported arch"; then
            echo "::error::expected unsupported-arch error; status=$status out=$out"; exit 1
          fi
          echo "✅ unsupported-arch: errored before download"

          # 7. gh present and skill-capable but OLDER than REQUIRED → must NOT
          #    fast-return; falls through the `sort -V -C` version gate into the
          #    install path (asserted by reaching the arch check, which errors
          #    before any network download). Cases 5/6 force the install path with a
          #    skill-LESS gh, so this "present, skill-capable, but stale" branch was
          #    otherwise unexercised — a broken comparison that fast-returned a
          #    too-old gh would silently skip the required upgrade and stay green.
          oldskill=$(mktemp -d)
          cat > "$oldskill/gh" <<'EOF'
          #!/usr/bin/env bash
          case "$1" in
            --version) echo "gh version 2.0.0 (2026-01-01)"; echo "https://github.com/cli/cli/releases/tag/v2.0.0" ;;
            skill) exit 0 ;;
            *) exit 0 ;;
          esac
          EOF
          chmod +x "$oldskill/gh"
          cat > "$oldskill/uname" <<'EOF'
          #!/usr/bin/env bash
          [ "$1" = "-s" ] && { echo Linux; exit 0; }
          echo sparc64
          EOF
          chmod +x "$oldskill/uname"
          set +e
          out=$(PATH="$oldskill:$PATH" REQUIRED=999.0.0 INSTALL_NAMESPACE=t bash "$script" 2>&1); status=$?
          set -e
          if [ "$status" -eq 0 ] || printf '%s' "$out" | grep -q "already supports" || ! printf '%s' "$out" | grep -q "Unsupported arch"; then
            echo "::error::expected too-old skill-capable gh to bypass fast-return and reach the arch check; status=$status out=$out"; exit 1
          fi
          echo "✅ stale-but-skill-capable: bypassed fast-return into install path"

          # 8. macOS (ext=zip) with unzip absent → the zip-needs-unzip guard fires
          #    BEFORE any network download. A skill-LESS gh forces the install path;
          #    uname is faked to Darwin/arm64 (valid arch → passes the arch check);
          #    and PATH is a CURATED stub dir holding only the stubs plus the real
          #    tools the pre-guard path needs (bash for the stubs' `env` shebang,
          #    mktemp for the tmp dir) — but NOT unzip — so `! command -v unzip` is
          #    true even on a runner that ships unzip. (Cases 5-7 keep the full PATH,
          #    so this "ext=zip but no unzip" guard — dead on Linux, where ext=tar.gz
          #    — was otherwise unexercised; a refactor dropping it would let the
          #    script fall through to a cryptic `unzip` failure instead of the
          #    actionable error.) The curated PATH means the stubs' `#!/usr/bin/env
          #    bash` shebang must resolve `bash`, so it is symlinked in too.
          nounzip=$(mktemp -d)
          cat > "$nounzip/gh" <<'EOF'
          #!/usr/bin/env bash
          case "$1" in
            skill) exit 1 ;;
            *) exit 0 ;;
          esac
          EOF
          chmod +x "$nounzip/gh"
          cat > "$nounzip/uname" <<'EOF'
          #!/usr/bin/env bash
          [ "$1" = "-s" ] && { echo Darwin; exit 0; }
          echo arm64
          EOF
          chmod +x "$nounzip/uname"
          ln -s "$(command -v bash)" "$nounzip/bash"
          ln -s "$(command -v mktemp)" "$nounzip/mktemp"
          set +e
          out=$(PATH="$nounzip" REQUIRED=999.0.0 INSTALL_NAMESPACE=t "$nounzip/bash" "$script" 2>&1); status=$?
          set -e
          if [ "$status" -eq 0 ] || ! printf '%s' "$out" | grep -q "unzip is required"; then
            echo "::error::expected unzip-missing guard to fire on the macOS zip path; status=$status out=$out"; exit 1
          fi
          echo "✅ macos-missing-unzip: guarded before download as expected"

          rm -rf "$okbin" "$badver" "$noskill" "$win" "$badarch" "$oldskill" "$nounzip"

