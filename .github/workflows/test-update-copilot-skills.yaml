name: 🧪 update-copilot-skills

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  test-update-noop:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 📦 Install a skill pinned to a historical commit
        uses: ./setup-copilot-skills
        with:
          skills: |
            github/awesome-copilot git-commit@8fbf6c4a798df51d1d1d8fd37a1aa7e94203109c

      - name: 🔄 Run update-copilot-skills (should be a no-op against a pinned skill)
        id: update
        uses: ./update-copilot-skills
        with:
          dir: .agents/skills

      - name: ✅ Verify no-op
        shell: bash
        env:
          CHANGED: ${{ steps.update.outputs.changed }}
          UPDATED: ${{ steps.update.outputs.updated-skills }}
        run: |
          set -euo pipefail
          if [[ "$CHANGED" != "false" ]]; then
            echo "::error::Expected changed=false when all skills are pinned, got: $CHANGED"
            echo "updated-skills output: $UPDATED"
            exit 1
          fi
          if ! grep -q '8fbf6c4a798df51d1d1d8fd37a1aa7e94203109c' .agents/skills/git-commit/SKILL.md; then
            echo "::error::Pinned commit SHA was removed from SKILL.md metadata"
            cat .agents/skills/git-commit/SKILL.md
            exit 1
          fi

  test-update-dry-run:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 📦 Install a skill pinned to a historical commit
        uses: ./setup-copilot-skills
        with:
          skills: |
            github/awesome-copilot git-commit@8fbf6c4a798df51d1d1d8fd37a1aa7e94203109c

      - name: 🔢 Snapshot SKILL.md hash before
        id: before
        shell: bash
        run: echo "sha=$(shasum -a 256 .agents/skills/git-commit/SKILL.md | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: 🔄 Run update-copilot-skills with --unpin --dry-run
        id: update
        uses: ./update-copilot-skills
        with:
          dir: .agents/skills
          unpin: "true"
          dry-run: "true"

      - name: ✅ Verify SKILL.md was not modified on disk
        shell: bash
        env:
          BEFORE: ${{ steps.before.outputs.sha }}
        run: |
          set -euo pipefail
          after=$(shasum -a 256 .agents/skills/git-commit/SKILL.md | awk '{print $1}')
          if [[ "$BEFORE" != "$after" ]]; then
            echo "::error::SKILL.md was modified despite --dry-run (before=$BEFORE after=$after)"
            exit 1
          fi

  test-missing-dir:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 🔄 Run update-copilot-skills against a missing dir (expected to fail)
        id: update
        continue-on-error: true
        uses: ./update-copilot-skills
        with:
          dir: does-not-exist

      - name: ✅ Verify step failed as expected
        shell: bash
        env:
          OUTCOME: ${{ steps.update.outcome }}
        run: |
          if [[ "$OUTCOME" != "failure" ]]; then
            echo "::error::Expected the action to fail on a missing directory, got: $OUTCOME"
            exit 1
          fi

  status-check:
    if: ${{ always() && !cancelled() }}
    needs: [test-update-noop, test-update-dry-run, test-missing-dir]
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: Check status
        env:
          RESULT_NOOP: ${{ needs.test-update-noop.result }}
          RESULT_DRY: ${{ needs.test-update-dry-run.result }}
          RESULT_MISSING: ${{ needs.test-missing-dir.result }}
        run: |
          for result in "$RESULT_NOOP" "$RESULT_DRY" "$RESULT_MISSING"; do
            if [[ "$result" == "failure" ]]; then
              exit 1
            fi
          done
