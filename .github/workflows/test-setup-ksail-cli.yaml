name: 🧪 setup-ksail-cli

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  test-setup-ksail-cli:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 🧪 Run setup-ksail-cli
        uses: ./setup-ksail-cli

      - name: ✅ Verify ksail is installed
        shell: bash
        run: ksail --version

  status-check:
    if: ${{ !cancelled() }}
    needs: [test-setup-ksail-cli]
    runs-on: ubuntu-latest
    steps:
      - name: Check status
        env:
          RESULT: ${{ needs.test-setup-ksail-cli.result }}
        run: |
          if [[ "$RESULT" == "failure" ]]; then
            exit 1
          fi
