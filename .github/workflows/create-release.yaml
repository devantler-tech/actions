name: 🎉 Create Release
on:
  workflow_call:
    inputs:
      disable-issue-side-effects:
        description: "Disable semantic-release success/fail hooks and their issue/PR permissions"
        required: false
        default: false
        type: boolean
      dry-run:
        description: "Run semantic-release in dry-run mode (no tags, releases, or publishes)"
        required: false
        default: false
        type: boolean
      breaking-bang-commits:
        description: "Treat `type!:` commits as breaking (major). semantic-release's default Angular preset ignores the bang, so such commits otherwise produce NO release at all. Default-off: existing callers are untouched."
        required: false
        default: false
        type: boolean
    secrets:
      APP_PRIVATE_KEY:
        required: true

permissions: {}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: 🛡️ Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: 🔑 Get GitHub App Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          # Keep existing notification-hook permissions by default for compatibility.
          # Opted-in callers omit them alongside the disabled hooks below.
          permission-contents: write
          permission-issues: ${{ !inputs.disable-issue-side-effects && 'write' || '' }}
          permission-pull-requests: ${{ !inputs.disable-issue-side-effects && 'write' || '' }}

      - name: 📑 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: 📦 Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: 💥 Teach semantic-release the `type!:` breaking form
        # semantic-release's default Angular preset recognises ONLY a
        # `BREAKING CHANGE:` footer, so `feat!:` produces NO RELEASE AT ALL —
        # a breaking change ships silently unversioned. The org's own
        # commit-message ruleset explicitly permits the bang, so contributors
        # are invited to write exactly the form that does nothing.
        #
        # This injects the bang pattern into the caller's EXISTING config in the
        # ephemeral workspace — nothing is committed, and the caller needs no
        # config change, only this input. Deliberately NOT `extends`: an extended
        # config makes semantic-release resolve plugins against the workspace,
        # but the Release step runs `npx`, which installs into the npx cache, so
        # `extends` dies with MODULE_NOT_FOUND unless the workflow also installs
        # semantic-release locally (an unpinned ad-hoc install). Editing the
        # config in place keeps plugin resolution exactly as it is today.
        #
        # FAILS CLOSED. Every path that cannot inject exits non-zero with the
        # reason: enabling this input and silently not applying it would leave a
        # breaking change unreleased while the run looked green — the exact
        # failure this feature exists to prevent.
        #
        # Existing parserOpts/releaseRules are MERGED as DEFAULTS, so a caller's
        # own values win.
        if: ${{ inputs.breaking-bang-commits }}
        run: |
          set -euo pipefail

          # semantic-release's own config search order.
          config=""
          json_path=""
          for f in .releaserc .releaserc.json .releaserc.yaml .releaserc.yml \
                   .releaserc.js .releaserc.cjs .releaserc.mjs \
                   release.config.js release.config.cjs release.config.mjs; do
            if [ -f "$f" ]; then config="$f"; break; fi
          done
          if [ -z "$config" ] && [ -f package.json ] && jq -e 'has("release")' package.json >/dev/null 2>&1; then
            config="package.json"
            json_path=".release"
          fi

          if [ -z "$config" ]; then
            echo "::error::breaking-bang-commits is enabled but no semantic-release config was found. Remove the input or add a JSON config."
            exit 1
          fi
          # A JS or YAML config cannot be rewritten safely; say so rather than
          # pretend the option was applied.
          case "$config" in
            *.js|*.cjs|*.mjs|*.yaml|*.yml)
              echo "::error::breaking-bang-commits supports JSON config only; found ${config}. Convert it to .releaserc/.releaserc.json/package.json, or add the breakingHeaderPattern to that file yourself."
              exit 1 ;;
          esac
          if ! jq -e . "$config" >/dev/null 2>&1; then
            echo "::error::${config} is not valid JSON (a bare .releaserc may be YAML); breaking-bang-commits supports JSON only."
            exit 1
          fi

          root="${json_path:-.}"
          if ! jq -e "${root} | has(\"plugins\")" "$config" >/dev/null 2>&1; then
            echo "::error::${config} declares no \"plugins\" — semantic-release would use its defaults, which this step cannot rewrite. Declare plugins explicitly to use breaking-bang-commits."
            exit 1
          fi

          # Separate statements, never `jq ... && mv ...`: on the left of `&&` a
          # failure is a *tested* condition, so `set -e` does not abort and a
          # later echo would make the step report success with the config
          # unchanged.
          jq --arg root "$root" '
            def bang: {breakingHeaderPattern: "^(\\w*)(?:\\((.*)\\))?!: (.*)$"};
            def inject:
              .plugins |= map(
                if type == "string" and . == "@semantic-release/commit-analyzer"
                then [., {parserOpts: bang, releaseRules: [{breaking: true, release: "major"}]}]
                elif type == "string" and . == "@semantic-release/release-notes-generator"
                then [., {parserOpts: bang}]
                elif type == "array" and .[0] == "@semantic-release/commit-analyzer"
                then [.[0], ((.[1] // {}) + {parserOpts: (bang + ((.[1].parserOpts) // {})),
                             releaseRules: (((.[1].releaseRules) // []) + [{breaking: true, release: "major"}])})]
                elif type == "array" and .[0] == "@semantic-release/release-notes-generator"
                then [.[0], ((.[1] // {}) + {parserOpts: (bang + ((.[1].parserOpts) // {}))})]
                else . end);
            if $root == ".release" then .release |= inject else inject end
          ' "$config" > "$config.bang"
          mv "$config.bang" "$config"

          # Verify the rewrite actually landed rather than trusting jq's exit.
          if ! jq -e "[${root} | .plugins[] | select(type == \"array\" and .[0] == \"@semantic-release/commit-analyzer\" and .[1].parserOpts.breakingHeaderPattern != null)] | length > 0" "$config" >/dev/null; then
            echo "::error::failed to inject the breaking-change pattern into ${config}; refusing to release with the option silently unapplied."
            exit 1
          fi
          echo "type!: commits will be treated as breaking (${config})"

      - name: 🎉 Release
        # GitHub already closes local issues from merge keywords. Disable the
        # nonessential notification hooks so a bare issue reference intended for
        # another repository cannot turn an otherwise-published release red.
        run: >-
          npx semantic-release@25.0.3
          ${{ inputs.disable-issue-side-effects && '--success false --fail false' || '' }}
          ${{ inputs.dry-run && '--dry-run' || '' }}
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
