name: 🎉 Create Release
on:
  workflow_call:
    inputs:
      disable-issue-side-effects:
        description: "Disable semantic-release success/fail hooks and their issue/PR permissions"
        required: false
        default: false
        type: boolean
      dry-run:
        description: "Run semantic-release in dry-run mode (no tags, releases, or publishes)"
        required: false
        default: false
        type: boolean
      breaking-bang-commits:
        description: "Treat `type!:` commits as breaking (major). semantic-release's default Angular preset ignores the bang, so such commits otherwise produce NO release at all. Default-off: existing callers are untouched."
        required: false
        default: false
        type: boolean
    secrets:
      APP_PRIVATE_KEY:
        required: true

permissions: {}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: 🛡️ Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: 🔑 Get GitHub App Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          # Keep existing notification-hook permissions by default for compatibility.
          # Opted-in callers omit them alongside the disabled hooks below.
          permission-contents: write
          permission-issues: ${{ !inputs.disable-issue-side-effects && 'write' || '' }}
          permission-pull-requests: ${{ !inputs.disable-issue-side-effects && 'write' || '' }}

      - name: 📑 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: 📦 Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: 💥 Teach semantic-release the `type!:` breaking form
        # semantic-release's default Angular preset recognises ONLY a
        # `BREAKING CHANGE:` footer, so `feat!:` produces NO RELEASE AT ALL —
        # a breaking change ships silently unversioned. The org's own
        # commit-message ruleset explicitly permits the bang, so contributors
        # are invited to write exactly the form that does nothing.
        #
        # This injects the bang pattern into the caller's EXISTING .releaserc in
        # the ephemeral workspace — nothing is committed, and the caller needs no
        # config change at all. Deliberately NOT done via `extends`: an extended
        # config makes semantic-release resolve plugins against the workspace,
        # but the Release step runs `npx`, which installs into the npx cache, so
        # `extends` dies with MODULE_NOT_FOUND unless the workflow also installs
        # semantic-release locally (which zizmor correctly flags as an unpinned
        # ad-hoc install). Editing the config in place keeps plugin resolution
        # exactly as it is today.
        #
        # Existing parserOpts/releaseRules are MERGED, never replaced, so a
        # caller that already customises them keeps its settings.
        if: ${{ inputs.breaking-bang-commits }}
        run: |
          set -euo pipefail
          config=""
          for f in .releaserc .releaserc.json .releaserc.yaml .releaserc.yml release.config.js; do
            [ -f "$f" ] && { config="$f"; break; }
          done
          if [ -z "$config" ]; then
            echo "::error::breaking-bang-commits is enabled but no semantic-release config was found"
            exit 1
          fi
          if [ "$config" != ".releaserc" ] && [ "$config" != ".releaserc.json" ]; then
            echo "::error::breaking-bang-commits currently supports only JSON config (.releaserc/.releaserc.json); found $config"
            exit 1
          fi
          jq '
            def bang: {breakingHeaderPattern: "^(\\w*)(?:\\((.*)\\))?!: (.*)$"};
            .plugins |= map(
              if type == "string" and . == "@semantic-release/commit-analyzer"
              then [., {parserOpts: bang, releaseRules: [{breaking: true, release: "major"}]}]
              elif type == "string" and . == "@semantic-release/release-notes-generator"
              then [., {parserOpts: bang}]
              elif type == "array" and .[0] == "@semantic-release/commit-analyzer"
              then [.[0], ((.[1] // {}) + {parserOpts: (bang + ((.[1].parserOpts) // {})),
                           releaseRules: (((.[1].releaseRules) // []) + [{breaking: true, release: "major"}])})]
              elif type == "array" and .[0] == "@semantic-release/release-notes-generator"
              then [.[0], ((.[1] // {}) + {parserOpts: (bang + ((.[1].parserOpts) // {}))})]
              else . end)
          ' "$config" > "$config.bang" && mv "$config.bang" "$config"
          echo 'type!: commits will be treated as breaking'

      - name: 🎉 Release
        # GitHub already closes local issues from merge keywords. Disable the
        # nonessential notification hooks so a bare issue reference intended for
        # another repository cannot turn an otherwise-published release red.
        run: >-
          npx semantic-release@25.0.3
          ${{ inputs.disable-issue-side-effects && '--success false --fail false' || '' }}
          ${{ inputs.dry-run && '--dry-run' || '' }}
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
