name: 🎉 Create Release
on:
  workflow_call:
    inputs:
      disable-issue-side-effects:
        description: "Disable semantic-release success/fail hooks and their issue/PR permissions"
        required: false
        default: false
        type: boolean
      dry-run:
        description: "Run semantic-release in dry-run mode (no tags, releases, or publishes)"
        required: false
        default: false
        type: boolean
    secrets:
      APP_PRIVATE_KEY:
        required: true

permissions: {}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: 🛡️ Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: 🔑 Get GitHub App Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          # Keep existing notification-hook permissions by default for compatibility.
          # Opted-in callers omit them alongside the disabled hooks below.
          permission-contents: write
          permission-issues: ${{ !inputs.disable-issue-side-effects && 'write' || '' }}
          permission-pull-requests: ${{ !inputs.disable-issue-side-effects && 'write' || '' }}

      - name: 📑 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: 🧩 Materialise the shared release config
        # Makes `"extends": "@devantler-tech/release-config"` resolvable in a
        # consumer's .releaserc. OPT-IN and fully backward compatible: a repo
        # that does not use `extends` is completely unaffected by this step.
        #
        # Why written inline rather than checked out from this repo: a reusable
        # workflow has the CONSUMER's repository checked out, not its own, so
        # reading a file from devantler-tech/actions would need a second
        # checkout at a ref this workflow cannot reliably derive. Writing it
        # here pins the config to the very commit of this workflow that the
        # consumer already pins by SHA — stronger versioning, no extra fetch,
        # no ref skew.
        #
        # Canonical copies live in release-config/ for review;
        # .github/tests/test-release-config-bumps.sh asserts this stays
        # byte-identical to them and that the bump behaviour is correct.
        run: |
          set -euo pipefail
          dir=node_modules/@devantler-tech/release-config
          mkdir -p "$dir"
          cat > "$dir/package.json" <<'JSON'
          {
            "name": "@devantler-tech/release-config",
            "version": "1.0.0",
            "description": "Shared semantic-release configuration for devantler-tech repositories.",
            "main": "index.json",
            "license": "MIT",
            "private": true
          }
          JSON
          cat > "$dir/index.json" <<'JSON'
          {
            "plugins": [
              [
                "@semantic-release/commit-analyzer",
                {
                  "parserOpts": {
                    "breakingHeaderPattern": "^(\\w*)(?:\\(([\\w\\-\\.]*)\\))?!: (.*)$"
                  },
                  "releaseRules": [
                    { "breaking": true, "release": "major" }
                  ]
                }
              ],
              "@semantic-release/release-notes-generator",
              "@semantic-release/github"
            ]
          }
          JSON
          cat > "$dir/tag-only.json" <<'JSON'
          {
            "plugins": [
              [
                "@semantic-release/commit-analyzer",
                {
                  "parserOpts": {
                    "breakingHeaderPattern": "^(\\w*)(?:\\(([\\w\\-\\.]*)\\))?!: (.*)$"
                  },
                  "releaseRules": [
                    { "breaking": true, "release": "major" }
                  ]
                }
              ]
            ]
          }
          JSON
          echo "shared release config available as @devantler-tech/release-config"

      - name: 📦 Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: 🎉 Release
        # GitHub already closes local issues from merge keywords. Disable the
        # nonessential notification hooks so a bare issue reference intended for
        # another repository cannot turn an otherwise-published release red.
        run: >-
          npx semantic-release@25.0.3
          ${{ inputs.disable-issue-side-effects && '--success false --fail false' || '' }}
          ${{ inputs.dry-run && '--dry-run' || '' }}
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
