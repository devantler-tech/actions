name: 🎉 Create Release
on:
  workflow_call:
    inputs:
      disable-issue-side-effects:
        description: "Disable semantic-release success/fail hooks and their issue/PR permissions"
        required: false
        default: false
        type: boolean
      dry-run:
        description: "Run semantic-release in dry-run mode (no tags, releases, or publishes)"
        required: false
        default: false
        type: boolean
    secrets:
      APP_PRIVATE_KEY:
        required: true

permissions: {}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: 🛡️ Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: 🔑 Get GitHub App Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          # Keep existing notification-hook permissions by default for compatibility.
          # Opted-in callers omit them alongside the disabled hooks below.
          permission-contents: write
          permission-issues: ${{ !inputs.disable-issue-side-effects && 'write' || '' }}
          permission-pull-requests: ${{ !inputs.disable-issue-side-effects && 'write' || '' }}

      - name: 📑 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: 🧩 Fetch the shared release config
        # Makes `"extends": "@devantler-tech/release-config"` resolvable in a
        # consumer's .releaserc. OPT-IN and fully backward compatible: a repo
        # that does not use `extends` is completely unaffected.
        #
        # Uses this repo's documented SAME-COMMIT SELF-CHECKOUT pattern
        # (AGENTS.md, "Self-references within this repo"): a reusable workflow
        # resolves `./` against the CALLER's checkout, so it cannot read its own
        # files directly — but `job.workflow_repository` at `job.workflow_sha`
        # names this workflow's own repo at its exact commit. Zero-lag by
        # construction, and it keeps ONE copy of the config rather than a
        # duplicate embedded here.
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: .devantler-tech-actions
          sparse-checkout: .github/release-config
          persist-credentials: false

      - name: 🧩 Install the shared release config
        run: |
          set -euo pipefail
          dir=node_modules/@devantler-tech/release-config
          mkdir -p "$dir"
          cp .devantler-tech-actions/.github/release-config/*.json "$dir/"
          # Drop the self-checkout: semantic-release inspects the workspace, and
          # a stray checkout should not be visible to it.
          rm -rf .devantler-tech-actions
          echo "shared release config available as @devantler-tech/release-config"

      - name: 📦 Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: 🎉 Release
        # GitHub already closes local issues from merge keywords. Disable the
        # nonessential notification hooks so a bare issue reference intended for
        # another repository cannot turn an otherwise-published release red.
        run: >-
          npx semantic-release@25.0.3
          ${{ inputs.disable-issue-side-effects && '--success false --fail false' || '' }}
          ${{ inputs.dry-run && '--dry-run' || '' }}
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
