name: 🎉 Create Release
on:
  workflow_call:
    inputs:
      disable-issue-side-effects:
        description: "Disable semantic-release success/fail hooks and their issue/PR permissions"
        required: false
        default: false
        type: boolean
      dry-run:
        description: "Run semantic-release in dry-run mode (no tags, releases, or publishes)"
        required: false
        default: false
        type: boolean
      use-shared-config:
        description: "Make @devantler-tech/release-config resolvable so .releaserc can `extends` it. Default-off: existing callers are untouched."
        required: false
        default: false
        type: boolean
    secrets:
      APP_PRIVATE_KEY:
        required: true

permissions: {}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: read # the same-commit self-checkout of this repo (shared release config)
    steps:
      - name: 🛡️ Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: 🔑 Get GitHub App Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          # Keep existing notification-hook permissions by default for compatibility.
          # Opted-in callers omit them alongside the disabled hooks below.
          permission-contents: write
          permission-issues: ${{ !inputs.disable-issue-side-effects && 'write' || '' }}
          permission-pull-requests: ${{ !inputs.disable-issue-side-effects && 'write' || '' }}

      - name: 📑 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: 🧩 Fetch the shared release config
        # OPT-IN (default-off, per AGENTS.md feature-flag-first): callers that do
        # not set use-shared-config never run this, so a fetch/auth hiccup here
        # can never abort their release.
        #
        # Uses this repo's documented SAME-COMMIT SELF-CHECKOUT pattern
        # (AGENTS.md, "Self-references within this repo"): a reusable workflow
        # resolves `./` against the CALLER's checkout, so `job.workflow_repository`
        # @ `job.workflow_sha` is what lets it read its own files at the exact
        # commit the caller pinned. One copy of the config, no embedded duplicate.
        if: ${{ inputs.use-shared-config }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: .devantler-tech-actions
          sparse-checkout: .github/release-config
          persist-credentials: false

      - name: 📦 Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: 🧩 Install the shared release config
        # semantic-release resolves plugins named in an EXTENDED config relative
        # to the workspace, but `npx semantic-release@…` installs into the npx
        # cache — not node_modules. Without a workspace install the extended
        # config dies with MODULE_NOT_FOUND (verified). Installing
        # semantic-release here puts @semantic-release/* where the extended
        # config can find them; the Release step's command is unchanged, and npx
        # reuses this resolution.
        if: ${{ inputs.use-shared-config }}
        run: |
          set -euo pipefail
          # --no-save / a scratch manifest: never mutate a caller's package.json.
          [ -f package.json ] || echo '{"name":"release-scratch","private":true}' > package.json
          npm install --no-save --no-audit --no-fund semantic-release@25.0.3
          dir=node_modules/@devantler-tech/release-config
          mkdir -p "$dir"
          cp .devantler-tech-actions/.github/release-config/*.json "$dir/"
          rm -rf .devantler-tech-actions
          echo "shared release config available as @devantler-tech/release-config"

      - name: 🎉 Release
        # GitHub already closes local issues from merge keywords. Disable the
        # nonessential notification hooks so a bare issue reference intended for
        # another repository cannot turn an otherwise-published release red.
        run: >-
          npx semantic-release@25.0.3
          ${{ inputs.disable-issue-side-effects && '--success false --fail false' || '' }}
          ${{ inputs.dry-run && '--dry-run' || '' }}
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
