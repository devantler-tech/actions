name: 🔍 CodeQL

# Advanced setup (replaces CodeQL default setup), running the same extended suite
# with NO query exclusions — see .github/codeql/codeql-config.yml.
#
# The actions/unpinned-tag exclusion that originally justified this setup was
# reverted in #541, once first-party self-references stopped being tag-pinned.
# Advanced setup is retained only because default setup is disabled in the repo
# settings (the two are mutually exclusive); returning to default setup is an
# equivalent settings-side alternative. CodeQL default setup must stay DISABLED
# for this to run.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  schedule:
    - cron: "30 1 * * 1" # weekly, mirroring the former default-setup schedule

permissions: {}

jobs:
  analyze:
    name: Analyze (actions)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - name: 🛡️ Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: 📑 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: 🔍 Initialize CodeQL
        uses: github/codeql-action/init@c35d1b164463ee62a100735382aaaa525c5d3496 # codeql-bundle-v2.25.6
        with:
          languages: actions
          build-mode: none
          # Emit BOTH code-scanning (security) AND code-quality results — matching what
          # default setup produced — so the repo's "Require code scanning results" and
          # "Require code quality results" rulesets are both satisfied. analysis-kinds is
          # flagged internal/subject-to-change in codeql-action, but it is the only way to
          # produce code-quality from advanced setup; safe here as the action is SHA-pinned
          # above and Dependabot bumps are CI-gated. If this input ever breaks, the
          # alternative is to drop the "Require code quality results" ruleset.
          analysis-kinds: code-scanning,code-quality
          config-file: ./.github/codeql/codeql-config.yml

      - name: 🔬 Perform CodeQL Analysis
        uses: github/codeql-action/analyze@c35d1b164463ee62a100735382aaaa525c5d3496 # codeql-bundle-v2.25.6
        with:
          category: "/language:actions"
