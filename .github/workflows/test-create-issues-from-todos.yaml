name: 🧪 create-issues-from-todos

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read
  issues: write

jobs:
  test-create-issues-from-todos:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 🧪 Run create-issues-from-todos
        uses: ./create-issues-from-todos
        with:
          app-id: ${{ vars.APP_ID }}
          app-private-key: ${{ secrets.APP_PRIVATE_KEY }}
          project: organization/devantler-tech/5

  status-check:
    if: ${{ !cancelled() }}
    needs: [test-create-issues-from-todos]
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: Check status
        env:
          RESULT: ${{ needs.test-create-issues-from-todos.result }}
        run: |
          if [[ "$RESULT" == "failure" ]]; then
            exit 1
          fi
