name: 🧪 Run .NET Tests

permissions: {}

on:
  workflow_call:
    inputs:
      working-directory:
        required: false
        type: string
        default: ""
        description: "Directory containing the .NET solution/project to test. Empty = repo root (the normal consumer case); the CI self-test sets it to a fixture so this workflow can be exercised in a repo that is not itself a .NET project."
  ### Required Workflow Triggers ###
  pull_request:
  merge_group:
  ##################################

jobs:
  test:
    permissions:
      contents: read
      packages: read
      # Required for the GitHub Code Quality coverage upload. Callers of this reusable workflow
      # must also grant `code-quality: write`, or the run fails at startup.
      code-quality: write
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    # Run for consumer calls (their repo) and for the fixture-targeted CI self-test
    # (working-directory set). Skip a bare standalone fire in THIS repo, which has no
    # .NET project at its root.
    if: ${{ inputs.working-directory != '' || github.repository != 'devantler-tech/actions' }}
    steps:
      - name: 🛡️ Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: 📑 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Self-reference: check out THIS workflow's own repo at the exact commit it is running
      # from (job.workflow_repository / job.workflow_sha), then call the sibling action by
      # local path. Same-commit resolution — no release lag, no tag refs; consumer SHA-pinning
      # policies see only the pinned actions/checkout plus a local `./` path.
      - name: 📥 Checkout devantler-tech/actions (this workflow's commit)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: .devantler-tech-actions
          persist-credentials: false

      - name: 🧪 Test .NET solution or project
        uses: ./.devantler-tech-actions/run-dotnet-tests
        with:
          # Never expose a token to PR-controlled MSBuild targets or tests. Authenticated
          # GitHub Packages restore remains available for workflow_call / merge-group runs.
          github-token: ${{ github.event_name != 'pull_request' && secrets.GITHUB_TOKEN || '' }}
          working-directory: ${{ inputs.working-directory || '.' }}
