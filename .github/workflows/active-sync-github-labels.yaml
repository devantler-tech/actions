name: 🔄 Sync labels

on:
  schedule:
    - cron: '0 0 * * *' # Every day at midnight


permissions:
  issues: write

jobs:
  sync:
    name: Run EndBug/label-sync
    runs-on: ubuntu-latest
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: 🔄 Sync labels
        uses: ./sync-github-labels
