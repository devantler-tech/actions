name: 🔄 Sync labels

on:
  schedule:
    - cron: '0 0 * * *' # Every day at midnight


permissions:
  issues: write

jobs:
  sync:
    name: Run EndBug/label-sync
    runs-on: ubuntu-latest
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: 🔄 Sync labels
        uses: ./sync-github-labels
