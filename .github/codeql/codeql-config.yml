name: "CodeQL config — devantler-tech/actions"

# Mirrors what CodeQL default setup runs (the extended suite for the `actions`
# language), with NO query exclusions.
#
# History: while first-party self-references were tag-pinned (so release-please
# could rewrite them per release), the actions/unpinned-tag query was excluded
# here because it flagged those intentional tags. Self-references now resolve by
# local path after a same-commit self-checkout and every remote `uses:` is
# pinned to a full-length commit SHA, so the exclusion was reverted (#426).
# Advanced setup itself is retained only because default setup is disabled in
# the repo settings (they are mutually exclusive); returning to default setup
# is an equivalent settings-side alternative.
queries:
  - uses: security-extended
